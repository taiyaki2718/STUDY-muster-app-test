name: Deploy demo to GitHub Pages

on:
  push:
    branches: ["claude/fitness-training-app-qykn33"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare site (public assets only)
        run: |
          mkdir -p _site
          cp index.html manifest.json sw.js _site/
          cp icon-192.png icon-512.png apple-touch-icon.png _site/
          cp README.md _site/ 2>/dev/null || true

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
