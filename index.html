<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a14" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="MUSCLE FORGE" />
  <title>MUSCLE FORGE — 筋トレ最強アプリ</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="icon" type="image/png" href="icon-192.png" />

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- React + Babel standalone -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    :root {
      /* ===== Design Tokens ===== */
      --bg: #0a0a14;
      --bg-soft: #11121f;
      --surface: #16182a;
      --surface-2: #1d2036;
      --border: #2a2e4a;
      --text: #e8eaf6;
      --text-dim: #9aa0c4;
      --text-faint: #646b96;
      --accent: #00e5ff;        /* neon cyan */
      --accent-2: #b14dff;      /* neon purple */
      --accent-3: #ff2e88;      /* neon pink */
      --good: #2bd99f;
      --warn: #ffb02e;
      --bad: #ff4d6d;
      --radius: 18px;
      --radius-sm: 12px;
      --shadow: 0 8px 30px rgba(0,0,0,0.45);
      --glow: 0 0 18px rgba(0,229,255,0.55);
    }
    [data-theme="light"] {
      --bg: #eef1fb;
      --bg-soft: #e3e7f7;
      --surface: #ffffff;
      --surface-2: #f1f3fc;
      --border: #d3d8ef;
      --text: #15182a;
      --text-dim: #4a5078;
      --text-faint: #7a80a8;
      --shadow: 0 8px 24px rgba(60,70,140,0.12);
    }
    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      overscroll-behavior-y: none; }
    #root { min-height: 100vh; }
    .app-bg {
      background:
        radial-gradient(900px 500px at 80% -10%, rgba(177,77,255,0.12), transparent 60%),
        radial-gradient(700px 500px at -10% 10%, rgba(0,229,255,0.10), transparent 55%),
        var(--bg);
    }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); }
    .glass { background: color-mix(in srgb, var(--surface) 78%, transparent); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); }
    .neon-text { text-shadow: 0 0 12px rgba(0,229,255,0.55); }
    .btn { min-height: 44px; border-radius: var(--radius-sm); font-weight: 700; transition: transform .12s ease, box-shadow .2s ease, background .2s ease; }
    .btn:active { transform: scale(0.96); }
    .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: #04121a; box-shadow: 0 6px 18px rgba(0,229,255,0.30); }
    .btn-ghost { background: var(--surface-2); color: var(--text); border: 1px solid var(--border); }
    .chip { border-radius: 999px; padding: 6px 12px; font-size: 12px; font-weight: 700; border: 1px solid var(--border); }
    .tab-active { color: var(--accent); }
    input, select { font-size: 16px; } /* prevent iOS zoom */
    .stepper-btn { width: 44px; height: 44px; display:flex; align-items:center; justify-content:center; font-size:22px; font-weight:800; }
    .slide-up { animation: slideUp .28s cubic-bezier(.2,.8,.2,1); }
    @keyframes slideUp { from { transform: translateY(24px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .pop { animation: pop .4s cubic-bezier(.2,1.4,.4,1); }
    @keyframes pop { 0% { transform: scale(.7); opacity:0; } 60% { transform: scale(1.08); } 100% { transform: scale(1); opacity:1; } }
    .pulse-glow { animation: pulseGlow 1.6s ease-in-out infinite; }
    @keyframes pulseGlow { 0%,100% { filter: drop-shadow(0 0 4px rgba(0,229,255,.5)); } 50% { filter: drop-shadow(0 0 14px rgba(0,229,255,.95)); } }
    .muscle { transition: fill .25s ease, filter .25s ease, opacity .2s ease; cursor: pointer; }
    .muscle:active { opacity: .8; }
    .muscle-selected { filter: drop-shadow(0 0 8px var(--accent)); }
    .confetti { position: fixed; inset: 0; pointer-events: none; z-index: 60; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .fade-in { animation: fadeIn .3s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .ring-progress { transition: stroke-dashoffset .6s cubic-bezier(.2,.8,.2,1); }
    .bar-grow { transition: height .5s cubic-bezier(.2,.8,.2,1); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useMemo, useRef, useCallback } = React;

    /* ============================================================
       VERSION / STORAGE
    ============================================================ */
    const APP_VERSION = "1.1.0";
    const STORAGE_KEY = "muscleForge_v1";
    const WATER_GOAL = 8; // cups/day

    /* ============================================================
       MUSCLE DEFINITIONS
    ============================================================ */
    const MUSCLES = {
      // FRONT
      chest:      { ja: "大胸筋",       en: "Chest",          side: "front", mev: 10, mav: 18, mrv: 22 },
      frontDelts: { ja: "三角筋前部",   en: "Front Delts",    side: "front", mev: 6,  mav: 12, mrv: 16 },
      biceps:     { ja: "上腕二頭筋",   en: "Biceps",         side: "front", mev: 8,  mav: 16, mrv: 20 },
      forearms:   { ja: "前腕",         en: "Forearms",       side: "both",  mev: 6,  mav: 12, mrv: 16 },
      abs:        { ja: "腹直筋",       en: "Abs",            side: "front", mev: 8,  mav: 16, mrv: 22 },
      obliques:   { ja: "腹斜筋",       en: "Obliques",       side: "front", mev: 6,  mav: 12, mrv: 16 },
      quads:      { ja: "大腿四頭筋",   en: "Quads",          side: "front", mev: 8,  mav: 16, mrv: 20 },
      adductors:  { ja: "内転筋",       en: "Adductors",      side: "front", mev: 6,  mav: 12, mrv: 16 },
      // BACK
      traps:      { ja: "僧帽筋",       en: "Traps",          side: "back",  mev: 8,  mav: 16, mrv: 22 },
      rearDelts:  { ja: "三角筋後部",   en: "Rear Delts",     side: "back",  mev: 6,  mav: 12, mrv: 18 },
      lats:       { ja: "広背筋",       en: "Lats",           side: "back",  mev: 10, mav: 18, mrv: 22 },
      erectors:   { ja: "脊柱起立筋",   en: "Erectors",       side: "back",  mev: 6,  mav: 12, mrv: 16 },
      triceps:    { ja: "上腕三頭筋",   en: "Triceps",        side: "back",  mev: 8,  mav: 16, mrv: 20 },
      glutes:     { ja: "大臀筋",       en: "Glutes",         side: "back",  mev: 8,  mav: 16, mrv: 20 },
      hamstrings: { ja: "ハムストリングス", en: "Hamstrings",  side: "back",  mev: 8,  mav: 16, mrv: 20 },
      calves:     { ja: "腓腹筋",       en: "Calves",         side: "back",  mev: 8,  mav: 16, mrv: 20 },
    };

    /* ============================================================
       EXERCISE DATABASE  (5-6 per muscle)
       type: compound | isolation
       equipment: barbell | dumbbell | machine | cable | bodyweight
       level: beginner | intermediate | advanced
    ============================================================ */
    const repScheme = { strength: "3〜5回 × 4〜5セット", hypertrophy: "8〜12回 × 3〜4セット", endurance: "15〜20回 × 2〜3セット" };
    const ex = (id, nameJa, nameEn, muscle, type, equipment, level, primary, secondary, tips, mistakes, reps) =>
      ({ id, nameJa, nameEn, muscle, type, equipment, level, primary, secondary, tips, mistakes, reps: reps || repScheme });

    const EXERCISE_DB = [
      // ===== CHEST =====
      ex("be_bench","ベンチプレス","Barbell Bench Press","chest","compound","barbell","intermediate","大胸筋","三角筋前部・上腕三頭筋","肩甲骨を寄せて下げ、胸の中部にバーを下ろす。足で床を踏ん張りアーチを作る。","お尻が浮く／バーが首側に落ちる／肩がすくむ"),
      ex("ch_db_press","ダンベルプレス","Dumbbell Bench Press","chest","compound","dumbbell","beginner","大胸筋","三角筋前部・上腕三頭筋","可動域を広く取り、ダンベルを胸の高さまで深く下ろす。手首は立てる。","下ろしが浅い／肘を開きすぎる／軌道がブレる"),
      ex("ch_incline","インクラインダンベルプレス","Incline DB Press","chest","compound","dumbbell","intermediate","大胸筋上部","三角筋前部","ベンチ角度30〜45度。鎖骨方向へ押し上げ、上部を狙う。","角度が急すぎて肩種目化／反動を使う"),
      ex("ch_fly","ダンベルフライ","Dumbbell Fly","chest","isolation","dumbbell","beginner","大胸筋","—","肘を軽く曲げたまま弧を描く。ストレッチを感じる位置で止める。","肘を伸ばしすぎる／プレス動作になる"),
      ex("ch_cable_fly","ケーブルクロスオーバー","Cable Crossover","chest","isolation","cable","intermediate","大胸筋","—","常に張力をかけ、最後は手を交差させ収縮を最大化。","反動で振る／可動域が狭い"),
      ex("ch_pushup","腕立て伏せ","Push-up","chest","compound","bodyweight","beginner","大胸筋","三角筋前部・上腕三頭筋","体を一直線に保ち胸を床ギリギリまで。手幅は肩よりやや広め。","腰が反る／可動域が浅い／首が落ちる"),

      // ===== FRONT DELTS =====
      ex("fd_ohp","オーバーヘッドプレス","Overhead Press","frontDelts","compound","barbell","intermediate","三角筋前部","三角筋中部・上腕三頭筋","体幹を締め、頭上へ真っ直ぐ。バーが顔を通る軌道で。","腰を反らせて押す／肘が落ちる"),
      ex("fd_db_press","ダンベルショルダープレス","DB Shoulder Press","frontDelts","compound","dumbbell","beginner","三角筋前部","三角筋中部","肘を軽く前に出し、耳の高さから押し上げる。","下ろしすぎて肩を痛める／反動"),
      ex("fd_front_raise","フロントレイズ","Front Raise","frontDelts","isolation","dumbbell","beginner","三角筋前部","—","肩の高さまで前方挙上。小指側をやや上げない。","反動で振る／高く上げすぎる"),
      ex("fd_arnold","アーノルドプレス","Arnold Press","frontDelts","compound","dumbbell","intermediate","三角筋前部","三角筋中部","回旋を加え可動域を広く。下で手のひらを内向きに。","回旋を急ぐ／重量過多でフォーム崩れ"),
      ex("fd_pike","パイクプッシュアップ","Pike Push-up","frontDelts","compound","bodyweight","intermediate","三角筋前部","上腕三頭筋","腰を高く上げ逆V字で頭頂を床へ。自重で肩を狙う。","腰が落ちる／可動域が浅い"),

      // ===== BICEPS =====
      ex("bi_barbell_curl","バーベルカール","Barbell Curl","biceps","isolation","barbell","beginner","上腕二頭筋","前腕","肘を体側に固定し、反動を使わず巻き上げる。","肘が前に出る／体を反らす"),
      ex("bi_db_curl","ダンベルカール","Dumbbell Curl","biceps","isolation","dumbbell","beginner","上腕二頭筋","前腕","回外（手首を返す）を意識し収縮を強める。","肩で持ち上げる／下ろしが速い"),
      ex("bi_incline","インクラインカール","Incline DB Curl","biceps","isolation","dumbbell","intermediate","上腕二頭筋（長頭）","—","ベンチに寄りかかり腕を後方へ。ストレッチ強調。","肘を前に出す／可動域不足"),
      ex("bi_hammer","ハンマーカール","Hammer Curl","biceps","isolation","dumbbell","beginner","上腕二頭筋・腕橈骨筋","前腕","手のひらを内向きに保ったまま挙上。前腕も同時に。","手首を返す／反動を使う"),
      ex("bi_chin","チンアップ","Chin-up","biceps","compound","bodyweight","intermediate","上腕二頭筋","広背筋","逆手で肩幅。胸を引き上げ顎をバーへ。","可動域が浅い／反動キッピング"),

      // ===== FOREARMS =====
      ex("fa_wrist_curl","リストカール","Wrist Curl","forearms","isolation","dumbbell","beginner","前腕屈筋群","—","前腕を台に固定し手首だけで巻く。フルレンジで。","腕全体で動かす／可動域不足"),
      ex("fa_rev_wrist","リバースリストカール","Reverse Wrist Curl","forearms","isolation","dumbbell","beginner","前腕伸筋群","—","手の甲側へ反らす。軽重量で丁寧に。","重すぎて可動域が出ない"),
      ex("fa_farmer","ファーマーズウォーク","Farmer's Walk","forearms","compound","dumbbell","beginner","前腕・握力","僧帽筋","重いダンベルを持ち姿勢を保ち歩く。握り潰す意識。","背中が丸まる／肩がすくむ"),
      ex("fa_rev_curl","リバースカール","Reverse Curl","forearms","isolation","barbell","intermediate","腕橈骨筋・前腕伸筋","上腕二頭筋","順手で握りカール。手首は固定。","手首が折れる／反動"),
      ex("fa_dead_hang","デッドハング","Dead Hang","forearms","isolation","bodyweight","beginner","握力・前腕","—","バーにぶら下がり耐える。肩は軽く下げる。","肩を完全に脱力しすぎる"),

      // ===== ABS =====
      ex("ab_crunch","クランチ","Crunch","abs","isolation","bodyweight","beginner","腹直筋","—","みぞおちを丸めるイメージで上体を起こす。首を引っ張らない。","勢いで起き上がる／首に力"),
      ex("ab_legraise","レッグレイズ","Leg Raise","abs","isolation","bodyweight","beginner","腹直筋下部","腸腰筋","骨盤を後傾させ脚を下ろす。腰を反らさない。","腰が浮く／反動で振る"),
      ex("ab_plank","プランク","Plank","abs","isolation","bodyweight","beginner","腹直筋・体幹","—","頭から踵まで一直線。お腹を凹ませ呼吸を続ける。","お尻が上がる／腰が落ちる"),
      ex("ab_cable_crunch","ケーブルクランチ","Cable Crunch","abs","isolation","cable","intermediate","腹直筋","—","膝立ちで背中を丸めて引く。負荷を腹で受ける。","腕で引く／股関節で曲げる"),
      ex("ab_hanging","ハンギングレッグレイズ","Hanging Leg Raise","abs","isolation","bodyweight","advanced","腹直筋下部","腸腰筋","ぶら下がり膝or脚を持ち上げる。骨盤を巻く。","反動でスイング／可動域不足"),

      // ===== OBLIQUES =====
      ex("ob_russian","ロシアンツイスト","Russian Twist","obliques","isolation","bodyweight","beginner","腹斜筋","腹直筋","上体を倒し左右に捻る。みぞおちから回旋。","腕だけ動かす／背中が丸まりすぎ"),
      ex("ob_side_plank","サイドプランク","Side Plank","obliques","isolation","bodyweight","beginner","腹斜筋・体幹","—","横向きで体を一直線に。腰を持ち上げ保持。","腰が落ちる／肩がすくむ"),
      ex("ob_bicycle","バイシクルクランチ","Bicycle Crunch","obliques","isolation","bodyweight","beginner","腹斜筋","腹直筋","肘と逆膝を近づけ捻る。ゆっくり対角。","首を引っ張る／速さ重視"),
      ex("ob_woodchop","ケーブルウッドチョップ","Cable Woodchop","obliques","isolation","cable","intermediate","腹斜筋","体幹","斜めに引き下ろす/振り上げる。回旋を体幹で。","腕主導／膝が流れる"),
      ex("ob_side_bend","サイドベンド","Dumbbell Side Bend","obliques","isolation","dumbbell","beginner","腹斜筋","—","片手にダンベル、横に倒して戻す。可動域を出す。","前後に傾く／反動"),

      // ===== QUADS =====
      ex("qu_squat","バーベルスクワット","Barbell Squat","quads","compound","barbell","intermediate","大腿四頭筋","大臀筋・ハムストリングス","胸を張り股関節と膝を同時に曲げる。膝はつま先方向。","膝が内に入る／踵が浮く／背中が丸まる"),
      ex("qu_leg_press","レッグプレス","Leg Press","quads","compound","machine","beginner","大腿四頭筋","大臀筋","足を肩幅、深く下ろす。腰がプレートから浮かない範囲で。","可動域が浅い／膝を伸ばし切りロック"),
      ex("qu_lunge","ランジ","Lunge","quads","compound","dumbbell","beginner","大腿四頭筋","大臀筋","大きく踏み出し前膝を90度。上体は立てる。","膝がつま先より大きく前に出る／バランス崩れ"),
      ex("qu_leg_ext","レッグエクステンション","Leg Extension","quads","isolation","machine","beginner","大腿四頭筋","—","膝を伸ばし切り収縮。ゆっくり戻す。","反動で蹴り上げる／戻しが速い"),
      ex("qu_bulgarian","ブルガリアンスクワット","Bulgarian Split Squat","quads","compound","dumbbell","intermediate","大腿四頭筋","大臀筋","後ろ足を台に乗せ片脚で深く沈む。前脚に荷重。","前傾しすぎ／後ろ足に頼る"),
      ex("qu_goblet","ゴブレットスクワット","Goblet Squat","quads","compound","dumbbell","beginner","大腿四頭筋","大臀筋","ダンベルを胸前で保持し深くしゃがむ。初心者に最適。","背中が丸まる／浅い"),

      // ===== ADDUCTORS =====
      ex("ad_machine","アダクションマシン","Hip Adduction Machine","adductors","isolation","machine","beginner","内転筋群","—","脚を閉じる動作で内ももを収縮。ゆっくり開いて戻す。","反動／可動域不足"),
      ex("ad_sumo","スモウデッドリフト","Sumo Deadlift","adductors","compound","barbell","intermediate","内転筋・大臀筋","ハムストリングス","脚を広く取り膝をつま先方向へ。内ももで床を押す。","膝が内に入る／背中が丸まる"),
      ex("ad_cossack","コサックスクワット","Cossack Squat","adductors","compound","bodyweight","intermediate","内転筋","大腿四頭筋","片側へ深く沈み反対脚を伸ばす。内もものストレッチ。","踵が浮く／バランス崩れ"),
      ex("ad_side_lunge","サイドランジ","Side Lunge","adductors","compound","dumbbell","beginner","内転筋","大腿四頭筋","横に大きく踏み出し片膝を曲げる。内ももで戻る。","膝が内に入る／浅い"),
      ex("ad_ball_squeeze","ボールスクイーズ","Adductor Ball Squeeze","adductors","isolation","bodyweight","beginner","内転筋群","—","膝の間でボールを潰す。収縮を数秒保持。","息を止める／力が抜ける"),

      // ===== TRAPS =====
      ex("tr_shrug","バーベルシュラッグ","Barbell Shrug","traps","isolation","barbell","beginner","僧帽筋上部","—","肩を真上にすくめ上げる。頂点で1秒静止。","肩を回す／前傾する"),
      ex("tr_db_shrug","ダンベルシュラッグ","Dumbbell Shrug","traps","isolation","dumbbell","beginner","僧帽筋上部","—","腕は脱力し肩だけ上下。可動域をフルに。","肘を曲げて引く／反動"),
      ex("tr_facepull","フェイスプル","Face Pull","traps","compound","cable","intermediate","僧帽筋中下部","三角筋後部","顔の高さへ引き肘を高く。肩甲骨を寄せる。","腕で引く／重すぎる"),
      ex("tr_upright","アップライトロウ","Upright Row","traps","compound","barbell","intermediate","僧帽筋","三角筋","肘から引き上げ鎖骨付近まで。手幅は肩幅。","引き上げすぎて肩を挟む／手幅が狭い"),
      ex("tr_farmer","ファーマーズキャリー","Farmer's Carry","traps","compound","dumbbell","beginner","僧帽筋","前腕・体幹","重量を持ち肩を引き下げ姿勢維持で歩く。","肩がすくみっぱなし／背中丸まる"),

      const proteinCal = protein * 4;
      const fatCal = fat * 9;
      const carbCal = Math.max(0, cals - proteinCal - fatCal);
      const carbs = carbCal / 4;                          // g
      return {
        calories: Math.round(cals),
        protein: Math.round(protein), fat: Math.round(fat), carbs: Math.round(carbs),

      const vol = weeklyVolumeByMuscle(state.logs);
      const last = lastTrainedByMuscle(state.logs);
      const split = SPLITS.find(s => s.key === state.settings.split) || SPLITS[0];
      const scored = split.days.map(day => {
        let score = 0;
        const details = day.muscles.map(m => {
          const def = MUSCLES[m];
          const sets = vol[m] || 0;
          const deficit = Math.max(0, def.mav - sets);
          const ago = last[m] ? daysBetween(last[m], todayStr()) : null;
          const recovered = ago === null || ago >= 2;
          score += deficit * (recovered ? 1 : 0.3);
          return { muscle: m, sets, target: def.mav, ago, recovered, deficit };
        });
        return { day, score, details };
      }).sort((a, b) => b.score - a.score);

      const best = scored[0];
      const picks = best.details
        .filter(d => d.sets < MUSCLES[d.muscle].mrv)
        .sort((a, b) => b.deficit - a.deficit)

      return { day: best.day, picks };

      for (let i = 1; i < days.length; i++) {
        if (daysBetween(days[i-1], days[i]) === 1) run++;
        else run = 1;

        for (let i = days.length - 1; i > 0; i--) {
          if (daysBetween(days[i-1], days[i]) === 1) current++;

      return { current, best, last };

        seedLog(-5, "fd_ohp", "frontDelts", [[35,10],[35,8]]),
        seedLog(-5, "ti_pushdown", "triceps", [[25,12],[25,12],[27.5,10]]),
        seedLog(-3, "la_latpulldown", "lats", [[50,12],[55,10],[55,9]]),
        seedLog(-3, "bi_db_curl", "biceps", [[14,12],[14,11]]),
        seedLog(-1, "qu_squat", "quads", [[80,8],[80,8],[85,6]]),
        seedLog(-1, "ha_rdl", "hamstrings", [[70,10],[70,10]]),
        seedLog(-1, "ca_standing", "calves", [[40,15],[40,15],[40,14]]),
      ],
      bodyWeightLog: [
        { date: dShift(-21), weight: 71.2 },
        { date: dShift(-14), weight: 70.8 },
        { date: dShift(-7),  weight: 70.4 },
        { date: dShift(0),   weight: 70.0 },
      ],
      todayMenu: [],
      intakeLog: {}, // { "YYYY-MM-DD": { water, kcal, protein } }
      gamification: { xp: 0, level: 0, current: 0, bestStreak: 0, badges: [] },
      bests: {}, // exerciseId -> best estimated 1RM
    });
    function dShift(days) { const d = new Date(); d.setDate(d.getDate() + days); return d.toISOString().slice(0,10); }
    function seedLog(days, exerciseId, muscle, setPairs) {
      return { id: "seed_" + exerciseId + "_" + days, date: dShift(days), exerciseId, muscle,
        sets: setPairs.map(([weight, reps]) => ({ weight, reps })) };
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) { const d = defaultState(); return recompute(d); }
        const parsed = JSON.parse(raw);
        // shallow merge to tolerate older versions
        const base = defaultState();
        const merged = {
          ...base, ...parsed,
          profile: { ...base.profile, ...(parsed.profile || {}) },
          settings: { ...base.settings, ...(parsed.settings || {}) },
          gamification: { ...base.gamification, ...(parsed.gamification || {}) },
          logs: Array.isArray(parsed.logs) ? parsed.logs : base.logs,
          bodyWeightLog: Array.isArray(parsed.bodyWeightLog) ? parsed.bodyWeightLog : base.bodyWeightLog,
          todayMenu: Array.isArray(parsed.todayMenu) ? parsed.todayMenu : [],
          intakeLog: (parsed.intakeLog && typeof parsed.intakeLog === "object") ? parsed.intakeLog : {},
          bests: parsed.bests || {},
        };
        return recompute(merged);
      } catch (e) {
        console.warn("localStorage load failed, using defaults", e);
        return recompute(defaultState());
      }
    }
    function saveState(state) {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
      catch (e) { console.warn("localStorage save failed", e); }
    }
    // recompute derived gamification + bests from logs
    function recompute(state) {
      const xp = xpFromLogs(state.logs);
      const level = levelFromXp(xp);
      const streak = computeStreak(state.logs);
      const bests = {};
      state.logs.forEach(l => {
        l.sets.forEach(st => {
          const e = epley1RM(st.weight, st.reps);
          if (!bests[l.exerciseId] || e > bests[l.exerciseId]) bests[l.exerciseId] = Math.round(e * 10) / 10;
        });
      });
      const earned = BADGES.filter(b => {
        try { return b.test({ ...state, gamification: { ...state.gamification, level, bestStreak: streak.best } }); }
        catch { return false; }
      }).map(b => b.id);
      return {
        ...state,
        bests,
        gamification: { xp, level, current: streak.current, bestStreak: streak.best, badges: earned },
      };
    }

    /* ============================================================

    function Stepper({ value, onChange, step = 2.5, min = 0, max = 9999, suffix = "" }) {

          <div className="flex-1 text-center">

              onChange={(e) => set(parseFloat(e.target.value) || 0)}

            {suffix && <span className="text-xs" style={{ color: "var(--text-faint)" }}>{suffix}</span>}
          </div>

    /* ============================================================
       CHARTS (SVG, self-made)
    ============================================================ */
    function DonutChart({ segments, size = 180, stroke = 26, center }) {
      const r = (size - stroke) / 2;
      const c = 2 * Math.PI * r;
      const total = segments.reduce((s, x) => s + x.value, 0) || 1;
      let offset = 0;
      return (
        <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
          <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="var(--surface-2)" strokeWidth={stroke} />
          {segments.map((seg, i) => {
            const len = (seg.value / total) * c;
            const el = (
              <circle key={i} cx={size/2} cy={size/2} r={r} fill="none" stroke={seg.color}
                strokeWidth={stroke} strokeDasharray={`${len} ${c - len}`} strokeDashoffset={-offset}
                strokeLinecap="butt" transform={`rotate(-90 ${size/2} ${size/2})`} className="ring-progress" />
            );
            offset += len;
            return el;
          })}
          {center && (
            <text x="50%" y="50%" textAnchor="middle" dominantBaseline="central"
              fill="var(--text)" fontSize="22" fontWeight="800">{center}</text>
          )}
        </svg>
      );
    }

    function LineChart({ data, height = 160, color = "var(--accent)", unit = "", fmtX }) {
      const w = 320;
      const pad = { l: 36, r: 12, t: 14, b: 22 };
      if (!data || data.length === 0)
        return <div className="text-center py-8 text-sm" style={{ color: "var(--text-faint)" }}>データがありません</div>;
      const xs = data.map((_, i) => i);
      const ys = data.map(d => d.y);
      const minY = Math.min(...ys), maxY = Math.max(...ys);
      const rangeY = (maxY - minY) || 1;
      const plotW = w - pad.l - pad.r, plotH = height - pad.t - pad.b;
      const X = (i) => pad.l + (data.length === 1 ? plotW/2 : (i / (data.length - 1)) * plotW);
      const Y = (v) => pad.t + plotH - ((v - minY) / rangeY) * plotH;
      const pts = data.map((d, i) => `${X(i)},${Y(d.y)}`).join(" ");
      const area = `${pad.l},${pad.t + plotH} ${pts} ${pad.l + plotW},${pad.t + plotH}`;
      const gid = "g_" + Math.random().toString(36).slice(2, 7);
      const ticks = [minY, (minY+maxY)/2, maxY];
      return (
        <svg width="100%" viewBox={`0 0 ${w} ${height}`} preserveAspectRatio="xMidYMid meet">
          <defs>
            <linearGradient id={gid} x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor={color} stopOpacity="0.35" />
              <stop offset="100%" stopColor={color} stopOpacity="0" />
            </linearGradient>
          </defs>
          {ticks.map((t, i) => (
            <g key={i}>
              <line x1={pad.l} y1={Y(t)} x2={w - pad.r} y2={Y(t)} stroke="var(--border)" strokeWidth="1" strokeDasharray="3 4" />
              <text x={pad.l - 5} y={Y(t)} textAnchor="end" dominantBaseline="central" fontSize="9" fill="var(--text-faint)">{Math.round(t)}</text>
            </g>
          ))}
          <polygon points={area} fill={`url(#${gid})`} />
          <polyline points={pts} fill="none" stroke={color} strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round" />
          {data.map((d, i) => (
            <circle key={i} cx={X(i)} cy={Y(d.y)} r="3" fill={color} stroke="var(--bg)" strokeWidth="1.5" />
          ))}
          {data.map((d, i) => (
            (i === 0 || i === data.length - 1 || data.length <= 6) &&
            <text key={"x"+i} x={X(i)} y={height - 6} textAnchor="middle" fontSize="9" fill="var(--text-faint)">
              {fmtX ? fmtX(d.x) : d.x}
            </text>
          ))}
        </svg>
      );
    }

    /* ============================================================
       LOG / RECORD MODAL  (sets + rest timer + 1RM)
    ============================================================ */
    function LogModal({ exercise, state, setState, onClose, onCelebrate }) {
      const prevBest = exercise ? (state.bests[exercise.id] || 0) : 0;
      const [sets, setSets] = useState([{ weight: 40, reps: 10 }]);
      const [rest, setRest] = useState(state.settings.defaultRest);
      const [remaining, setRemaining] = useState(0);
      const [running, setRunning] = useState(false);
      const intervalRef = useRef(null);

      useEffect(() => {
        if (!running) return;
        intervalRef.current = setInterval(() => {
          setRemaining(r => {
            if (r <= 1) { clearInterval(intervalRef.current); setRunning(false); fireAlarm(state.settings); return 0; }
            return r - 1;
          });
        }, 1000);
        return () => clearInterval(intervalRef.current);
      }, [running]);

      if (!exercise) return null;
      const e = exercise;
      const startRest = () => { setRemaining(rest); setRunning(true); };
      const stopRest = () => { setRunning(false); clearInterval(intervalRef.current); };

      const updateSet = (i, key, val) => setSets(s => s.map((x, idx) => idx === i ? { ...x, [key]: val } : x));
      const addSet = () => setSets(s => [...s, { ...s[s.length - 1] }]);
      const removeSet = (i) => setSets(s => s.length > 1 ? s.filter((_, idx) => idx !== i) : s);

      const bestThisSession = Math.max(0, ...sets.map(s => epley1RM(s.weight, s.reps)));
      const isPR = bestThisSession > prevBest && prevBest > 0;

      const save = () => {
        const entry = { id: "log_" + Date.now(), date: todayStr(), exerciseId: e.id, muscle: e.muscle,
          sets: sets.map(s => ({ weight: +s.weight || 0, reps: +s.reps || 0 })) };
        setState(s => recompute({ ...s, logs: [...s.logs, entry] }));
        if (bestThisSession > prevBest) onCelebrate(`新記録! 推定1RM ${Math.round(bestThisSession*10)/10}kg 🎉`);
        onClose();
      };

      return (
        <Modal open={!!exercise} onClose={onClose} title={"記録: " + e.nameJa}>
          {/* rest timer */}
          <div className="card p-3 mb-3 text-center" style={{ background: "var(--surface-2)" }}>
            <div className="text-xs mb-1" style={{ color: "var(--text-dim)" }}>レストタイマー</div>
            <div className="text-4xl font-black neon-text mb-2" style={{ color: running ? "var(--accent)" : "var(--text)" }}>
              {fmtTime(running ? remaining : rest)}
            </div>
            <div className="flex items-center gap-2 justify-center mb-2">
              {[60,90,120,180].map(t => (
                <button key={t} onClick={() => setRest(t)} className="chip"

    const fmtTime = (s) => `${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;
    function fireAlarm(settings) {
      try { if (settings.vibrate && navigator.vibrate) navigator.vibrate([200,100,200]); } catch {}
      try {
        if (settings.sound) {
          const ctx = new (window.AudioContext || window.webkitAudioContext)();
          const o = ctx.createOscillator(), g = ctx.createGain();
          o.connect(g); g.connect(ctx.destination);
          o.type = "sine"; o.frequency.value = 880;
          g.gain.setValueAtTime(0.001, ctx.currentTime);
          g.gain.exponentialRampToValueAtTime(0.3, ctx.currentTime + 0.02);
          g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.6);
          o.start(); o.stop(ctx.currentTime + 0.6);
        }
      } catch {}
    }

    /* ============================================================
       PROGRESS TAB
    ============================================================ */
    function ProgressTab({ state, setState }) {
      const exIds = useMemo(() => [...new Set(state.logs.map(l => l.exerciseId))], [state.logs]);
      const [selEx, setSelEx] = useState(exIds[0] || "");
      useEffect(() => { if (!exIds.includes(selEx)) setSelEx(exIds[0] || ""); }, [exIds.join(",")]);

      // 1RM trend per selected exercise (best per day)
      const oneRmData = useMemo(() => {
        const byDay = {};
        state.logs.filter(l => l.exerciseId === selEx).forEach(l => {
          const best = Math.max(0, ...l.sets.map(s => epley1RM(s.weight, s.reps)));
          byDay[l.date] = Math.max(byDay[l.date] || 0, best);
        });
        return Object.keys(byDay).sort().map(d => ({ x: d.slice(5), y: Math.round(byDay[d]*10)/10 }));
      }, [state.logs, selEx]);

      // weekly total volume (last 8 weeks)
      const volData = useMemo(() => {
        const weeks = {};
        state.logs.forEach(l => {
          const wk = weekKey(l.date);
          const vol = l.sets.reduce((s, st) => s + st.weight * st.reps, 0);
          weeks[wk] = (weeks[wk] || 0) + vol;
        });
        return Object.keys(weeks).sort().slice(-8).map(w => ({ x: w.slice(5), y: Math.round(weeks[w]) }));
      }, [state.logs]);

      const bwData = useMemo(() =>
        [...state.bodyWeightLog].sort((a,b) => a.date.localeCompare(b.date)).map(b => ({ x: b.date.slice(5), y: b.weight })),
        [state.bodyWeightLog]);

      const [bw, setBw] = useState(state.profile.weight);
      const logBodyWeight = () => {
        const entry = { date: todayStr(), weight: +bw };
        setState(s => ({
          ...s,
          bodyWeightLog: [...s.bodyWeightLog.filter(x => x.date !== todayStr()), entry],
          profile: { ...s.profile, weight: +bw },
        }));
      };

      // recovery indicators
      const lastMap = useMemo(() => lastTrainedByMuscle(state.logs), [state.logs]);

      return (
        <div className="p-4 pb-28 fade-in">
          <Header title="進捗" sub="1RM・ボリューム・体重の推移" state={state} />

          <div className="card p-4 mb-4">
            <h3 className="font-extrabold mb-2">推定1RM 推移</h3>
            <select value={selEx} onChange={(e) => setSelEx(e.target.value)}
              className="w-full mb-2 rounded-xl p-2.5 text-sm outline-none"
              style={{ background: "var(--surface-2)", color: "var(--text)", border: "1px solid var(--border)" }}>
              {exIds.length === 0 && <option>記録なし</option>}
              {exIds.map(id => { const e = EXERCISE_DB.find(x => x.id === id); return <option key={id} value={id}>{e ? e.nameJa : id}</option>; })}
            </select>
            <LineChart data={oneRmData} color="var(--accent)" unit="kg" />
          </div>

          <div className="card p-4 mb-4">
            <h3 className="font-extrabold mb-2">週間総ボリューム（kg）</h3>
            <LineChart data={volData} color="var(--accent-2)" unit="kg" />
          </div>

          <div className="card p-4 mb-4">
            <h3 className="font-extrabold mb-2">体重推移</h3>
            <LineChart data={bwData} color="var(--good)" unit="kg" />
            <div className="flex items-end gap-2 mt-3">
              <div className="flex-1"><Field label="今日の体重"><Stepper value={bw} step={0.1} min={30} max={250} onChange={setBw} suffix="kg" /></Field></div>
              <button className="btn btn-primary px-4 py-3" onClick={logBodyWeight}>記録</button>
            </div>
          </div>

          <div className="card p-4">
            <h3 className="font-extrabold mb-2">筋肉別 回復インジケーター</h3>
            <div className="grid grid-cols-2 gap-2">
              {Object.entries(MUSCLES).map(([k, m]) => {
                const last = lastMap[k];
                const ago = last ? daysBetween(last, todayStr()) : null;
                const recovered = ago === null ? null : ago >= 2;
                return (
                  <div key={k} className="flex items-center justify-between rounded-xl p-2.5" style={{ background: "var(--surface-2)" }}>
                    <span className="text-sm">{m.ja}</span>
                    <span className="text-xs font-bold" style={{ color: ago === null ? "var(--text-faint)" : recovered ? "var(--good)" : "var(--warn)" }}>
                      {ago === null ? "—" : ago === 0 ? "今日" : `${ago}日前`}
                    </span>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      );
    }
    function weekKey(dateStr) {
      const d = new Date(dateStr);
      const day = (d.getDay() + 6) % 7; // Monday=0
      d.setDate(d.getDate() - day);
      return d.toISOString().slice(0, 10);
    }

    /* ============================================================
       SETTINGS TAB (program, gamification, data, theme)
    ============================================================ */
    function SettingsTab({ state, setState, applyTheme }) {
      const g = state.gamification;
      const nextLvlXp = xpForLevel(g.level + 1);
      const curLvlXp = xpForLevel(g.level);
      const pct = Math.max(0, Math.min(100, ((g.xp - curLvlXp) / (nextLvlXp - curLvlXp || 1)) * 100));
      const split = SPLITS.find(s => s.key === state.settings.split) || SPLITS[0];
      const fileRef = useRef(null);
      const [syncCode, setSyncCode] = useState("");
      const [importCode, setImportCode] = useState("");

      const setSetting = (key, val) => setState(s => ({ ...s, settings: { ...s.settings, [key]: val } }));

      const encodeData = (obj) => btoa(unescape(encodeURIComponent(JSON.stringify(obj))));
      const decodeData = (code) => JSON.parse(decodeURIComponent(escape(atob(code.trim()))));
      const genSyncCode = () => { try { setSyncCode(encodeData(state)); } catch (e) { alert("コード生成に失敗しました"); } };
      const copySyncCode = () => {
        try {
          if (navigator.clipboard) navigator.clipboard.writeText(syncCode);
          alert("同期コードをコピーしました");
        } catch (e) { alert("コピーできませんでした。手動で選択してください"); }
      };
      const applySyncCode = () => {
        try {
          const parsed = decodeData(importCode);
          const base = defaultState();
          setState(recompute({ ...base, ...parsed,
            profile: { ...base.profile, ...(parsed.profile || {}) },
            settings: { ...base.settings, ...(parsed.settings || {}) },
            intakeLog: parsed.intakeLog || {},
          }));
          applyTheme((parsed.settings && parsed.settings.theme) || "dark");
          setImportCode("");
          alert("同期が完了しました");
        } catch (e) { alert("無効な同期コードです"); }
      };

      const exportData = () => {
        try {
          const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url; a.download = `muscleforge_backup_${todayStr()}.json`;
          a.click(); URL.revokeObjectURL(url);
        } catch (e) { alert("エクスポートに失敗しました"); }
      };
      const importData = (file) => {
        const reader = new FileReader();
        reader.onload = () => {
          try {
            const parsed = JSON.parse(reader.result);
            setState(recompute({ ...defaultState(), ...parsed,
              profile: { ...defaultState().profile, ...(parsed.profile||{}) },
              settings: { ...defaultState().settings, ...(parsed.settings||{}) },
            }));
            applyTheme((parsed.settings && parsed.settings.theme) || "dark");
            alert("インポートしました");
          } catch (e) { alert("無効なJSONファイルです"); }
        };
        reader.readAsText(file);
      };
      const resetAll = () => {
        if (confirm("全データを削除して初期化しますか？")) {
          const d = recompute(defaultState());
          setState(d); applyTheme(d.settings.theme);
        }
      };

      const volMap = useMemo(() => weeklyVolumeByMuscle(state.logs), [state.logs]);

      return (
        <div className="p-4 pb-28 fade-in">
          <Header title="設定" sub="プログラム・実績・データ管理" state={state} />

          {/* gamification */}
          <div className="card p-4 mb-4">
            <div className="flex items-center justify-between mb-2">
              <div>
                <div className="text-xs" style={{ color: "var(--text-faint)" }}>レベル</div>
                <div className="text-3xl font-black neon-text">Lv. {g.level}</div>
              </div>
              <div className="text-right">
                <div className="text-xs" style={{ color: "var(--text-faint)" }}>連続記録</div>
                <div className="text-2xl font-black" style={{ color: "var(--warn)" }}>🔥 {g.current}日</div>
                <div className="text-[11px]" style={{ color: "var(--text-faint)" }}>最高 {g.bestStreak}日</div>
              </div>
            </div>
            <div className="w-full h-3 rounded-full overflow-hidden" style={{ background: "var(--surface-2)" }}>
              <div className="h-full ring-progress" style={{ width: pct + "%", background: "linear-gradient(90deg, var(--accent), var(--accent-2))" }}></div>
            </div>
            <div className="text-[11px] mt-1 text-right" style={{ color: "var(--text-faint)" }}>
              {g.xp} / {nextLvlXp} XP（次のレベルまで {Math.max(0, nextLvlXp - g.xp)}）
            </div>
          </div>

          {/* badges */}
          <div className="card p-4 mb-4">
            <h3 className="font-extrabold mb-2">実績バッジ</h3>
            <div className="grid grid-cols-2 gap-2">
              {BADGES.map(b => {
                const earned = g.badges.includes(b.id);
                return (
                  <div key={b.id} className="rounded-xl p-3 flex items-center gap-2"
                    style={{ background: "var(--surface-2)", opacity: earned ? 1 : 0.4 }}>
                    <span className="text-2xl">{b.icon}</span>
                    <div>
                      <div className="text-sm font-bold">{b.name}</div>
                      <div className="text-[10px]" style={{ color: "var(--text-faint)" }}>{b.desc}</div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>

          {/* program / volume */}
          <div className="card p-4 mb-4">
            <h3 className="font-extrabold mb-2">トレーニングプログラム</h3>
            <select value={state.settings.split} onChange={(e) => setSetting("split", e.target.value)}
              className="w-full mb-3 rounded-xl p-2.5 text-sm outline-none"
              style={{ background: "var(--surface-2)", color: "var(--text)", border: "1px solid var(--border)" }}>
              {SPLITS.map(s => <option key={s.key} value={s.key}>{s.name}</option>)}
            </select>
            <div className="space-y-2">
              {split.days.map((day, i) => (
                <div key={i} className="rounded-xl p-3" style={{ background: "var(--surface-2)" }}>
                  <div className="font-bold text-sm mb-1" style={{ color: "var(--accent)" }}>{day.name}</div>
                  <div className="flex flex-wrap gap-1">
                    {day.muscles.map(m => <Badge key={m}>{MUSCLES[m].ja}</Badge>)}
                  </div>
                </div>
              ))}
            </div>
          </div>

          {/* volume landmarks */}
          <div className="card p-4 mb-4">
            <h3 className="font-extrabold mb-1">週間ボリューム（MEV/MAV/MRV）</h3>
            <p className="text-[11px] mb-2" style={{ color: "var(--text-faint)" }}>
              MEV 最低効果 / MAV 最大適応 / MRV 最大回復可能ボリューム
            </p>
            <div className="space-y-1.5">
              {Object.entries(MUSCLES).map(([k, m]) => {
                const sets = volMap[k] || 0;
                const z = volumeZone(sets, k);
                const w = Math.min(100, (sets / (m.mrv + 4)) * 100);
                return (
                  <div key={k}>
                    <div className="flex justify-between text-[11px]">
                      <span>{m.ja}</span>
                      <span style={{ color: z.color }}>{sets} セット・{z.label}</span>
                    </div>
                    <div className="w-full h-2 rounded-full overflow-hidden" style={{ background: "var(--surface-2)" }}>
                      <div className="h-full" style={{ width: w + "%", background: z.color }}></div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>

          {/* timer / theme settings */}
          <div className="card p-4 mb-4 space-y-3">
            <h3 className="font-extrabold">アプリ設定</h3>
            <Field label="デフォルトレスト時間">
              <Stepper value={state.settings.defaultRest} step={15} min={15} max={600} onChange={(v) => setSetting("defaultRest", v)} suffix="秒" />
            </Field>
            <ToggleRow label="タイマー音" value={state.settings.sound} onChange={(v) => setSetting("sound", v)} />
            <ToggleRow label="バイブレーション" value={state.settings.vibrate} onChange={(v) => setSetting("vibrate", v)} />
            <ToggleRow label="ライトモード" value={state.settings.theme === "light"}
              onChange={(v) => { const t = v ? "light" : "dark"; setSetting("theme", t); applyTheme(t); }} />
          </div>

          {/* data management */}
          <div className="card p-4 mb-4 space-y-2">
            <h3 className="font-extrabold mb-1">データ管理</h3>
            <button className="btn btn-ghost w-full py-3" onClick={exportData}>📤 データをエクスポート（JSON）</button>
            <button className="btn btn-ghost w-full py-3" onClick={() => fileRef.current.click()}>📥 データをインポート（JSON）</button>
            <input ref={fileRef} type="file" accept="application/json" className="hidden"
              onChange={(e) => { if (e.target.files[0]) importData(e.target.files[0]); e.target.value = ""; }} />
            <button className="btn w-full py-3" style={{ background: "rgba(255,77,109,.15)", color: "var(--bad)" }} onClick={resetAll}>🗑 全データをリセット</button>
          </div>

          {/* cross-device sync (code-based, serverless) */}
          <div className="card p-4 mb-4 space-y-2">
            <h3 className="font-extrabold mb-1">端末間同期（コード方式）</h3>
            <p className="text-[11px]" style={{ color: "var(--text-faint)" }}>
              サーバー不要。コードを生成して別端末に貼り付ければデータを移行できます。
            </p>
            <button className="btn btn-ghost w-full py-3" onClick={genSyncCode}>🔗 同期コードを生成</button>
            {syncCode && (
              <div className="slide-up">
                <textarea readOnly value={syncCode} rows={3}
                  className="w-full rounded-xl p-2 text-[11px] no-scrollbar outline-none"
                  style={{ background: "var(--surface-2)", color: "var(--text-dim)", border: "1px solid var(--border)" }} />
                <button className="btn btn-primary w-full py-2.5 mt-1 text-sm" onClick={copySyncCode}>📋 コピー</button>
              </div>
            )}
            <textarea value={importCode} onChange={(e) => setImportCode(e.target.value)} rows={3}
              placeholder="別端末で生成した同期コードを貼り付け"
              className="w-full rounded-xl p-2 text-[11px] no-scrollbar outline-none mt-2"
              style={{ background: "var(--surface-2)", color: "var(--text)", border: "1px solid var(--border)" }} />
            <button className="btn btn-ghost w-full py-3" disabled={!importCode}
              style={{ opacity: importCode ? 1 : 0.5 }} onClick={applySyncCode}>📲 コードから復元</button>
            <p className="text-[11px]" style={{ color: "var(--text-faint)" }}>
              ※ Apple Health / Google Fit 連携や自動クラウド同期はバックエンド/ネイティブが必要なため本アプリ単体では対象外です。
            </p>
          </div>

          <div className="text-center text-[11px]" style={{ color: "var(--text-faint)" }}>
            MUSCLE FORGE v{APP_VERSION}
          </div>
        </div>
      );
    }
    function ToggleRow({ label, value, onChange }) {
      return (
        <div className="flex items-center justify-between">
          <span className="text-sm">{label}</span>
          <button onClick={() => onChange(!value)} className="w-12 h-7 rounded-full transition-colors relative"
            style={{ background: value ? "var(--accent)" : "var(--surface-2)" }}>
            <span className="absolute top-0.5 w-6 h-6 rounded-full bg-white transition-all" style={{ left: value ? "22px" : "2px" }}></span>
          </button>
        </div>
      );
    }

    /* ============================================================
       SHARED HEADER + NAV + APP
    ============================================================ */
    function Header({ title, sub, state }) {
      const g = state.gamification;
      return (
        <div className="flex items-end justify-between mb-4">
          <div>
            <h1 className="text-2xl font-black neon-text">{title}</h1>
            <p className="text-xs" style={{ color: "var(--text-faint)" }}>{sub}</p>
          </div>
          <div className="flex items-center gap-2">
            <Badge tone="purple">Lv.{g.level}</Badge>
            <Badge tone="warn">🔥{g.current}</Badge>
          </div>
        </div>
      );
    }

    const TABS = [
      { key: "body", label: "ボディ", icon: "🫀" },
      { key: "record", label: "記録", icon: "📝" },
      { key: "nutrition", label: "栄養", icon: "🥗" },
      { key: "progress", label: "進捗", icon: "📈" },
      { key: "settings", label: "設定", icon: "⚙️" },
    ];

    function Toast({ msg }) {
      if (!msg) return null;
      return (
        <div className="fixed left-1/2 -translate-x-1/2 z-[70] pop"
          style={{ bottom: "92px" }}>
          <div className="card glass px-5 py-3 font-bold text-center" style={{ borderColor: "var(--good)", color: "var(--good)" }}>
            {msg}
          </div>
        </div>
      );
    }

    function App() {
      const [state, setStateRaw] = useState(loadState);
      const [tab, setTab] = useState("body");
      const [detailEx, setDetailEx] = useState(null);
      const [logEx, setLogEx] = useState(null);
      const [toast, setToast] = useState("");
      const prevBadges = useRef(state.gamification.badges);

      const setState = useCallback((updater) => {
        setStateRaw(prev => {
          const next = typeof updater === "function" ? updater(prev) : updater;
          saveState(next);
          return next;
        });
      }, []);

      const applyTheme = useCallback((theme) => {
        document.documentElement.setAttribute("data-theme", theme);
      }, []);

      useEffect(() => { applyTheme(state.settings.theme); }, []);

      // celebrate newly earned badges
      useEffect(() => {
        const newly = state.gamification.badges.filter(b => !prevBadges.current.includes(b));
        if (newly.length > 0) {
          const b = BADGES.find(x => x.id === newly[newly.length - 1]);
          if (b) celebrate(`実績解除: ${b.icon} ${b.name}`);
        }
        prevBadges.current = state.gamification.badges;
      }, [state.gamification.badges.join(",")]);

      const celebrate = (msg) => { setToast(msg); setTimeout(() => setToast(""), 2600); };

      const openExercise = (e) => setDetailEx(e);
      const openLog = (e) => { setDetailEx(null); setLogEx(e); };
      const addToMenu = (id) => setState(s => s.todayMenu.includes(id) ? s : ({ ...s, todayMenu: [...s.todayMenu, id] }));

      return (
        <div className="app-bg min-h-screen">
          <div className="max-w-md mx-auto relative">
            {tab === "body" && <BodyMapTab state={state} setState={setState} openExercise={openExercise} />}
            {tab === "record" && <RecordTab state={state} setState={setState} openLog={openLog} openExercise={openExercise} />}
            {tab === "nutrition" && <NutritionTab state={state} setState={setState} />}
            {tab === "progress" && <ProgressTab state={state} setState={setState} />}
            {tab === "settings" && <SettingsTab state={state} setState={setState} applyTheme={applyTheme} />}
          </div>

          <Toast msg={toast} />

          <ExerciseDetail exercise={detailEx} onClose={() => setDetailEx(null)}
            onAddMenu={(id) => { addToMenu(id); celebrate("メニューに追加しました"); }}
            inMenu={detailEx ? state.todayMenu.includes(detailEx.id) : false}
            onLog={openLog} />

          <LogModal exercise={logEx} state={state} setState={setState}
            onClose={() => setLogEx(null)} onCelebrate={celebrate} />

          {/* bottom nav */}
          <nav className="fixed bottom-0 left-0 right-0 z-40 glass border-t" style={{ borderColor: "var(--border)", paddingBottom: "env(safe-area-inset-bottom)" }}>
            <div className="max-w-md mx-auto grid grid-cols-5">
              {TABS.map(t => (
                <button key={t.key} onClick={() => setTab(t.key)}
                  className="flex flex-col items-center justify-center py-2.5 gap-0.5"
                  style={{ minHeight: "56px", color: tab === t.key ? "var(--accent)" : "var(--text-faint)" }}>
                  <span className="text-xl" style={ tab === t.key ? { filter: "drop-shadow(0 0 6px var(--accent))" } : {} }>{t.icon}</span>
                  <span className="text-[10px] font-bold">{t.label}</span>
                </button>
              ))}
            </div>
          </nav>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>

  <!-- Service Worker registration (plain JS, not transpiled) -->
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("sw.js").catch(function () {});
      });
    }
  </script>
</body>
</html>
