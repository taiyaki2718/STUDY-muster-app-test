// ----- ONBOARDING (first-run, lowest-friction first step) -----
// 行動科学の核を3ステップに凝縮:
//  ① アイデンティティ(Atomic Habits) ② 具体的な目標(Locke & Latham)
//  ③ 2分でできる最初の一歩(Fogg) ＋ if-thenきっかけ(Gollwitzer)
// いつでもスキップ可能（押し付けない＝ダークパターンにしない）。
function Onboarding() {
  const { dispatch, addToast } = useApp();
  const [step, setStep] = useState(0);
  const [identity, setIdentity] = useState('');
  const [goal, setGoal] = useState('');
  const [task, setTask] = useState('');
  const [cue, setCue] = useState('');

  const finish = (skip) => {
    dispatch({
      type: 'COMPLETE_ONBOARDING',
      identity: skip ? '' : identity,
      goal: skip ? null : { title: goal },
      task: skip ? null : { title: task, cue }
    });
    if (!skip && task.trim()) addToast('最初の一歩を今日のタスクに追加しました', 'success');
  };

  const next = () => setStep(s => Math.min(2, s + 1));
  const back = () => setStep(s => Math.max(0, s - 1));

  return html`
    <div class="onb">
      <div class="onb__inner">
        <div class="onb__dots">
          ${[0,1,2].map(i => html`<div key=${i} class="onb__dot ${i === step ? 'is-on' : ''}"></div>`)}
        </div>

        ${step === 0 ? html`
          <div>
            <div class="onb__title">ようこそ。<br/>まず<span class="accent">なりたい自分</span>を。</div>
            <div class="onb__sub mt-4">目標は「何をするか」より「どんな人になりたいか」から始めると続きます。</div>
          </div>
          <input class="glass-input" placeholder="例: 毎日少しずつ学ぶ人" value=${identity} onInput=${e => setIdentity(e.currentTarget.value)} />
          <div class="onb__why">なぜ効く？ ── アイデンティティに紐づく習慣は長続きする（Atomic Habits）。空欄でもOK。</div>
          <button class="glass-btn glass-btn--primary glass-btn--block" onClick=${next}>次へ</button>
          <button class="onb__skip" onClick=${() => finish(true)}>スキップして始める</button>
        ` : null}

        ${step === 1 ? html`
          <div>
            <div class="onb__title">いま一番叶えたい<br/><span class="accent">目標を1つ</span>。</div>
            <div class="onb__sub mt-4">具体的なほど叶いやすい。ざっくりでも大丈夫、あとで育てられます。</div>
          </div>
          <input class="glass-input" placeholder="例: 英語を話せるようになる" value=${goal} onInput=${e => setGoal(e.currentTarget.value)} onKeyDown=${e => { if (e.key === 'Enter' && goal.trim()) next(); }} />
          <div class="onb__why">なぜ効く？ ── 具体的で挑戦的な目標は達成率を上げる（Locke & Latham）。</div>
          <div class="flex-row">
            <button class="glass-btn" style="flex:0 0 auto;" onClick=${back}>戻る</button>
            <button class="glass-btn glass-btn--primary" style="flex:1;" onClick=${next}>次へ</button>
          </div>
          <button class="onb__skip" onClick=${() => finish(true)}>スキップして始める</button>
        ` : null}

        ${step === 2 ? html`
          <div>
            <div class="onb__title">最初の一歩を<br/><span class="accent">2分でできる</span>大きさに。</div>
            <div class="onb__sub mt-4">今日やる、ごく小さな一歩。そして「いつやるか」を決めておくと実行率が跳ね上がります。</div>
          </div>
          <div>
            <div class="holo-label mb-2">2分の一歩</div>
            <input class="glass-input" placeholder="例: 教科書を1ページ開く" value=${task} onInput=${e => setTask(e.currentTarget.value)} />
          </div>
          <div>
            <div class="holo-label mb-2">いつやる？（きっかけ・任意）</div>
            <input class="glass-input" placeholder="例: 朝コーヒーを淹れたら" value=${cue} onInput=${e => setCue(e.currentTarget.value)} />
          </div>
          <div class="onb__why">なぜ効く？ ── 「Xしたら、Yする」の if-then 計画は最もコスパの高い介入（Gollwitzer）。摩擦は2分まで下げる（Fogg）。</div>
          <div class="flex-row">
            <button class="glass-btn" style="flex:0 0 auto;" onClick=${back}>戻る</button>
            <button class="glass-btn glass-btn--primary" style="flex:1;" onClick=${() => finish(false)}>始める</button>
          </div>
          <button class="onb__skip" onClick=${() => finish(true)}>スキップして始める</button>
        ` : null}
      </div>
    </div>
  `;
}

// ----- AUTO-PLAN (keyless): goal + deadline -> tasks auto-placed on the calendar -----
function AutoPlanModal({ initial, onClose, go }) {
  const { dispatch, addToast } = useApp();
  const [title, setTitle] = useState((initial && initial.title) || '');
  const [deadline, setDeadline] = useState((initial && initial.deadline) || addDays(today(), 30));
  const [cadence, setCadence] = useState('daily');
  const [perSession, setPerSession] = useState('');
  const goalId = initial && initial.goalId;

  const preview = useMemo(() => title.trim() ? planGoal({ title, deadline, cadence, perSession }) : null, [title, deadline, cadence, perSession]);

  const apply = () => {
    if (!title.trim()) return;
    const plan = planGoal({ title, deadline, cadence, perSession });
    if (!goalId) dispatch({ type: 'ADD_GOAL', goal: { id: uid(), title: title.trim(), deadline: plan.deadline } });
    dispatch({ type: 'ADD_TASKS', tasks: plan.tasks });
    addToast(`${plan.count}件のタスクをカレンダーに配置しました`, 'success');
    onClose();
    if (go) go('calendar');
  };

  return html`
    <${Modal} title="カレンダーに自動で割り振る" icon="calendar" onClose=${onClose}>
      <div class="holo-label" style="text-transform:none; letter-spacing:normal; line-height:1.6; margin-bottom:16px;">
        目標と期限を入れるだけで、今日から期限まで「やるべき事」をカレンダーへ自動配置します。<b>APIキーは不要</b>です。
      </div>
      <div class="holo-label mb-2">目標</div>
      <input class="glass-input mb-4" placeholder="例: 半年でTOEIC800点" value=${title} onInput=${e => setTitle(e.currentTarget.value)} aria-label="目標"/>
      <div class="holo-label mb-2">期限</div>
      <input class="glass-input mb-4" type="date" value=${deadline} onInput=${e => setDeadline(e.currentTarget.value)} aria-label="期限"/>
      <div class="grid-2 mb-4">
        <div>
          <div class="holo-label mb-2">頻度</div>
          <select class="glass-select" value=${cadence} onChange=${e => setCadence(e.currentTarget.value)} aria-label="頻度">
            <option value="daily">毎日</option>
            <option value="weekdays">平日（月〜金）</option>
            <option value="mwf">週3回（月・水・金）</option>
            <option value="weekly">週1回（月曜）</option>
          </select>
        </div>
        <div>
          <div class="holo-label mb-2">1回の内容（任意）</div>
          <input class="glass-input" placeholder="例: 単語を10個" value=${perSession} onInput=${e => setPerSession(e.currentTarget.value)} aria-label="1回の内容"/>
        </div>
      </div>

      ${preview ? html`
        <div class="holo-item mb-4" style="flex-direction:column; align-items:flex-start; gap:6px; border-color: var(--holo-cyan);">
          <div style="font-weight:600;">${preview.count} 件のタスクを配置します</div>
          <div class="holo-label" style="text-transform:none; letter-spacing:normal;">${preview.first} 〜 ${preview.last}（${preview.cadenceLabel}）／ 最初は今日の「2分の一歩」から</div>
        </div>
      ` : html`<div class="holo-label text-center mb-4" style="text-transform:none; letter-spacing:normal;">目標を入力するとプレビューが出ます</div>`}

      <button class="glass-btn glass-btn--primary glass-btn--block" disabled=${!title.trim()} onClick=${apply}><${Icon} n="calendar" size=16/> カレンダーに割り振る</button>

// ----- AI COACH (Claude API, BYOK) -----
// 行動変容の差別化: 目標分解（思考回路/タスクに接続）と、つまずき診断・振り返りの対話。
function buildCoachContext(state) {
  const t = today();
  const todayTasks = state.tasks.filter(x => x.date === t);
  const done = todayTasks.filter(x => x.done).length;
  const goals = state.goals.length
    ? state.goals.map(g => `- ${g.title}（期限 ${g.deadline || '未設定'}）`).join('\n')
    : '（未設定）';
  const recent7 = state.timer.sessions
    .filter(s => dayDiff(dstr(new Date(s.t)), t) <= 7 && dayDiff(dstr(new Date(s.t)), t) >= 0)
    .reduce((a, s) => a + s.min, 0);
  return [
    `なりたい自分: ${state.identity || '未設定'}`,
    `目標:\n${goals}`,
    `今日のタスク: ${done}/${todayTasks.length} 完了`,
    `連続日数(ストリーク): ${state.streak}`,
    `直近7日の集中: ${recent7} 分`
  ].join('\n');
}

function Coach({ go }) {
  const { state, dispatch, addToast } = useApp();
  const [mode, setMode] = useState('decompose');
  // proxy が設定されていれば全利用者が鍵不要でAI利用可。無ければ各自のキー有無で判定。
  const [hasKey, setHasKey] = useState(ClaudeAPI.available());
  const [autoPlan, setAutoPlan] = useState(null);

  // --- 目標分解 ---
  const [goalTitle, setGoalTitle] = useState('');
  const [deadline, setDeadline] = useState('');
  const [plan, setPlan] = useState(null);
  const [planLoading, setPlanLoading] = useState(false);

  // --- 対話 ---
  const [chat, setChat] = useState([]); // {role, content}
  const [input, setInput] = useState('');
  const [chatLoading, setChatLoading] = useState(false);
  const logRef = useRef(null);

  useEffect(() => { if (logRef.current) logRef.current.scrollTop = logRef.current.scrollHeight; }, [chat, chatLoading]);

  const runDecompose = async () => {
    const title = goalTitle.trim();
    if (!title) return;
    setPlan(null); setPlanLoading(true);
    try {
      const result = await ClaudeAPI.decompose({ title, deadline, identity: state.identity });
      setPlan(result);
    } catch (e) {
      addToast(e.code === 'NO_KEY' ? 'APIキーを設定してください' : (e.message || 'エラーが発生しました'), 'info');
      if (e.code === 'NO_KEY') setHasKey(false);
    } finally { setPlanLoading(false); }
  };

  const addGoalFromPlan = () => {
    const title = (plan.restated_goal || goalTitle).trim();
    if (!title) return;
    dispatch({ type: 'ADD_GOAL', goal: { id: uid(), title, deadline: deadline || addDays(today(), 30) } });
    addToast('目標を追加しました', 'success');
  };
  const addTodayStep = () => {
    const tk = { id: uid(), title: plan.today_step.title.trim(), date: today(), done: false };
    if (plan.today_step.cue) tk.cue = plan.today_step.cue.trim();
    dispatch({ type: 'ADD_TASK', task: tk });
    addToast('今日の一歩を追加しました', 'success');
  };
  const addWeekActions = () => {
    (plan.week_actions || []).forEach((a, i) => {
      dispatch({ type: 'ADD_TASK', task: { id: uid(), title: String(a).trim(), date: addDays(today(), i), done: false } });
    });
    addToast('今週の行動をタスクに追加しました', 'success');
  };

  const send = async (text) => {
    const content = (text != null ? text : input).trim();
    if (!content || chatLoading) return;
    const base = [...chat, { role: 'user', content }];
    setInput(''); setChatLoading(true);
    // 空のアシスタント吹き出しを置き、ストリームで埋めていく。
    setChat([...base, { role: 'assistant', content: '' }]);
    let acc = '';
    try {
      acc = await ClaudeAPI.chatStream(base, buildCoachContext(state), (full) => {
        setChat([...base, { role: 'assistant', content: full }]);
      });
      if (!acc) setChat([...base, { role: 'assistant', content: '（応答が空でした）' }]);
    } catch (e) {
      setChat([...base, { role: 'assistant', content: '⚠️ ' + (e.code === 'NO_KEY' ? 'APIキーが未設定です。設定画面で登録してください。' : (e.message || 'エラーが発生しました')) }]);
      if (e.code === 'NO_KEY') setHasKey(false);
    } finally { setChatLoading(false); }
  };

  if (!hasKey) {
    return html`
      <div class="app__inner">
        <div class="glass-panel text-center">
          <div class="holo-icon mb-4" style="margin:0 auto;"><${Icon} n="calendar"/></div>
          <div style="font-weight:700; font-size:1.1rem; margin-bottom:8px; color:var(--text-cyan); text-shadow:var(--text-glow-cyan);">目標を自動で計画する</div>
          <div class="holo-label" style="line-height:1.7; text-transform:none; letter-spacing:normal; margin-bottom:8px;">
            目標と期限を入れるだけで、達成までの「やるべき事」をカレンダーへ自動で割り振ります。<b>APIキーは不要</b>です。
          </div>
          <button class="glass-btn glass-btn--primary glass-btn--block mt-4" onClick=${() => setAutoPlan({})}>
            <${Icon} n="calendar" size=16/> 目標からカレンダーに自動で割り振る
          </button>
        </div>

        <div class="glass-panel text-center">
          <div class="holo-label" style="line-height:1.7; text-transform:none; letter-spacing:normal;">
            さらにパーソナルな分解や、つまずき相談・振り返りを使いたい場合は、AIコーチ（Anthropicの自分のAPIキー）を登録できます。<b>任意</b>です。
          </div>
          <button class="glass-btn glass-btn--block mt-4" onClick=${() => go('settings')}>AIコーチ用のAPIキーを登録（任意）</button>
        </div>

        ${autoPlan ? html`<${AutoPlanModal} initial=${autoPlan} onClose=${() => setAutoPlan(null)} go=${go}/>` : null}
      </div>
    `;
  }

  return html`
    <div class="app__inner">
      <div class="glass-panel glass-panel--sm coach-seg">
        <button class="glass-btn ${mode === 'decompose' ? 'glass-btn--primary' : ''}" onClick=${() => setMode('decompose')}><${Icon} n="branch" size=16/> 目標を分解</button>
        <button class="glass-btn ${mode === 'chat' ? 'glass-btn--primary' : ''}" onClick=${() => setMode('chat')}><${Icon} n="message" size=16/> 相談する</button>
      </div>

      ${mode === 'decompose' ? html`
        <div class="glass-panel">
          <div class="holo-label mb-2">分解したい目標</div>
          <select class="glass-select mb-4" onChange=${e => { const g = state.goals.find(x => x.id === e.currentTarget.value); if (g) { setGoalTitle(g.title); setDeadline(g.deadline || ''); } }}>
            <option value="">（既存の目標から選ぶ / 下に直接入力）</option>
            ${state.goals.map(g => html`<option key=${g.id} value=${g.id}>${g.title}</option>`)}
          </select>
          <input class="glass-input mb-4" placeholder="例: 半年でTOEIC800点" value=${goalTitle} onInput=${e => setGoalTitle(e.currentTarget.value)} />
          <div class="holo-label mb-2">期限（任意）</div>
          <input class="glass-input mb-4" type="date" value=${deadline} onInput=${e => setDeadline(e.currentTarget.value)} />
          <button class="glass-btn glass-btn--primary glass-btn--block" disabled=${planLoading || !goalTitle.trim()} onClick=${runDecompose}>
            ${planLoading ? 'AIが分解中…' : 'この目標をAIで分解する'}
          </button>
        </div>

        ${plan ? html`
          <div class="glass-panel">
            <div class="holo-label mb-2">具体化した目標</div>
            <div style="font-weight:600; color:var(--text-cyan); text-shadow:var(--text-glow-cyan); margin-bottom:16px;">${plan.restated_goal}</div>

            <div class="holo-label mb-2">マイルストーン</div>
            <div class="holo-list mb-4">
              ${(plan.milestones || []).map((m, i) => html`
                <div class="holo-item" key=${i} style="flex-direction:column; align-items:flex-start; gap:4px;">
                  <div style="font-weight:600; font-size:0.92rem;">${i + 1}. ${m.title}</div>
                  ${m.why ? html`<div class="holo-label" style="text-transform:none; letter-spacing:normal;">${m.why}</div>` : null}
                </div>
              `)}
            </div>

            <div class="holo-label mb-2">今週の行動</div>
            <div class="holo-list mb-4">
              ${(plan.week_actions || []).map((a, i) => html`<div class="holo-item" key=${i} style="padding:10px 14px;"><div class="holo-item__text" style="font-size:0.9rem;">${a}</div></div>`)}
            </div>

            <div class="holo-label mb-2">今日の2分の一歩</div>
            <div class="holo-item mb-4" style="flex-direction:column; align-items:flex-start; gap:4px; border-color:var(--holo-cyan);">
              <div style="font-weight:600;">${plan.today_step.title}</div>
              ${plan.today_step.cue ? html`<div class="cue-line"><${Icon} n="branch" size=12/> ${plan.today_step.cue} のとき</div>` : null}
            </div>

            ${plan.encouragement ? html`<div class="holo-label text-center mb-4" style="text-transform:none; letter-spacing:normal; color:var(--text-cyan);">${plan.encouragement}</div>` : null}

            <div class="holo-label mb-2">アプリに反映</div>
            <div class="holo-list">
              <button class="glass-btn glass-btn--primary glass-btn--block" onClick=${() => setAutoPlan({ title: plan.restated_goal || goalTitle, deadline })}><${Icon} n="calendar" size=16/> この目標をカレンダーに自動で割り振る</button>
              <button class="glass-btn glass-btn--block" onClick=${addTodayStep}><${Icon} n="plus" size=16/> 今日の一歩だけ追加</button>
              <button class="glass-btn glass-btn--block" onClick=${addGoalFromPlan}><${Icon} n="target" size=16/> この目標を追加</button>
              <button class="glass-btn glass-btn--block" onClick=${addWeekActions}><${Icon} n="calendar" size=16/> 今週の行動をタスク化</button>
            </div>
          </div>
        ` : null}
      ` : html`
        <div class="glass-panel">
          <div class="chat-log" ref=${logRef}>
            ${chat.length === 0 ? html`
              <div class="holo-label text-center" style="padding:16px; text-transform:none; letter-spacing:normal; line-height:1.7;">
                行動科学にもとづくコーチに相談できます。<br/>下のボタンか、自由に入力してください。
              </div>
            ` : chat.map((m, i) => html`<div class="chat-msg ${m.role}" key=${i}>${m.content ? m.content : (chatLoading && i === chat.length - 1 ? html`<span class="typing-dots"><span></span><span></span><span></span></span>` : '')}</div>`)}
          </div>

          <div class="coach-chips mb-4">
            <button class="coach-chip" onClick=${() => send('最近サボってしまって、やる気が出ません。どうすればいい？')}>つまずいた</button>
            <button class="coach-chip" onClick=${() => send('今日の振り返りを手伝って。うまくいった点と次の一歩を整理したい。')}>今日の振り返り</button>
            <button class="coach-chip" onClick=${() => send('目標に対して、今日まず何から始めればいい？')}>何から始める？</button>
          </div>

          <div class="flex-row">
            <input class="glass-input" placeholder="コーチに相談…" value=${input} disabled=${chatLoading} onInput=${e => setInput(e.currentTarget.value)} onKeyDown=${e => { if (e.key === 'Enter') send(); }} />
            <button class="glass-btn glass-btn--primary glass-btn--icon" disabled=${chatLoading || !input.trim()} onClick=${() => send()}><${Icon} n="send" size=18/></button>
          </div>
        </div>
        <div class="holo-label text-center" style="text-transform:none; letter-spacing:normal; opacity:0.75;">${ClaudeAPI.usingProxy() ? 'AIサーバー経由で送信されます。' : 'あなたのAPIキーで直接Anthropicに送信されます。'}要約された状況のみを共有します。</div>
      `}

      ${autoPlan ? html`<${AutoPlanModal} initial=${autoPlan} onClose=${() => setAutoPlan(null)} go=${go}/>` : null}
    </div>
  `;
}

/* ============================================================
   App Core
   ============================================================ */
const VIEWS = { home: Home, calendar: Calendar, maps: CircuitMap, timer: Timer, cards: Cards, goals: Goals, insight: Insight, coach: Coach, settings: Settings };
const TABS = [
  { id: 'home', icon: 'core', label: 'ホーム' },
  { id: 'calendar', icon: 'calendar', label: 'カレンダー' },
  { id: 'maps', icon: 'branch', label: '思考回路' },
  { id: 'goals', icon: 'target', label: '目標' },
  { id: 'timer', icon: 'timer', label: '集中タイマー' },
  { id: 'cards', icon: 'layers', label: 'フラッシュカード' },
  { id: 'insight', icon: 'insight', label: '解析' },
  { id: 'coach', icon: 'message', label: 'AIコーチ' },
  { id: 'settings', icon: 'settings', label: '設定' }
];

function App() {
  const [state, dispatch] = useReducer(reducer, undefined, () => {
    try {
      const r = localStorage.getItem(STORE_KEY);
      const loaded = r ? { ...seed(), ...JSON.parse(r) } : seed();
      return reconcileStreak(loaded);
    } catch(e){ return seed(); }
  });
  const [tab, setTab] = useState('home');
  const [toasts, setToasts] = useState([]);
  const [confirmReq, setConfirmReq] = useState(null); // { message, resolve }

  const addToast = useCallback((text, kind = 'info') => {
    const id = uid();
    setToasts(ts => [...ts.slice(-2), { id, text, kind }]);
    setTimeout(() => setToasts(ts => ts.filter(x => x.id !== id)), 3000);
  }, []);

  // confirm()/alert() の代わりにアプリ内（ホログラフィック）モーダルで確認する。
  // Promise<boolean> を返すので await できる。
  const confirm = useCallback((message) => new Promise(resolve => setConfirmReq({ message, resolve })), []);
  const resolveConfirm = (val) => { setConfirmReq(req => { if (req) req.resolve(val); return null; }); };

  useEffect(() => {
    const s = setTimeout(() => { localStorage.setItem(STORE_KEY, JSON.stringify(state)); }, 500);
    return () => clearTimeout(s);
  }, [state]);

  useEffect(() => { document.documentElement.setAttribute('data-theme', state.settings.theme); }, [state.settings.theme]);

  const toggleTheme = () => {
    const next = state.settings.theme === 'dark' ? 'light' : 'dark';
    dispatch({ type: 'SET_SETTINGS', patch: { theme: next } });
  };

  const View = VIEWS[tab] || Home;

  const onboarding = shouldOnboard(state);

  const currentLabel = (TABS.find(t => t.id === tab) || {}).label || '';

  return html`
    <${Ctx.Provider} value=${{ state, dispatch, addToast, confirm }}>

      ${onboarding ? html`<${Onboarding} />` : null}

      <!-- Theme Toggle (Top Right) -->
      <button class="theme-toggle" onClick=${toggleTheme} aria-label=${state.settings.theme === 'dark' ? 'ライトモードに切り替え' : 'ダークモードに切り替え'}>
        <${Icon} n=${state.settings.theme === 'dark' ? 'sun' : 'moon'}/>
      </button>

      <main class="app__main" id="main" aria-label=${currentLabel}>
        <${View} go=${setTab}/>
      </main>

      <nav class="nav" aria-label="メインナビゲーション">
        ${TABS.map(t => html`
          <button class="nav__item ${tab === t.id ? 'is-active' : ''}" key=${t.id} aria-label=${t.label} aria-current=${tab === t.id ? 'page' : null} onClick=${() => { setTab(t.id); const m = document.querySelector('.app__main'); if (m) m.scrollTo(0, 0); }}>
            <${Icon} n=${t.icon}/>
          </button>
        `)}
      </nav>

      ${confirmReq ? html`<${ConfirmDialog} message=${confirmReq.message} onResolve=${resolveConfirm}/>` : null}

      <div class="toasts" aria-live="polite" role="status">
        ${toasts.map(t => html`<div class="holo-toast" key=${t.id}><${Icon} n="zap"/> ${t.text}</div>`)}
      </div>
    </${Ctx.Provider}>
  `;
}

render(html`<${App}/>`, document.getElementById('app'));
</script>
