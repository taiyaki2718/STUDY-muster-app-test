<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>GoalFlow: Holographic OS</title>
<meta name="theme-color" content="#060B14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<!-- PWA: Installable / Home Screen / Offline -->
<meta name="mobile-web-app-capable" content="yes">
<meta name="application-name" content="GoalFlow">
<meta name="apple-mobile-web-app-title" content="GoalFlow">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180.png">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">
<link rel="apple-touch-startup-image" href="icons/icon-512.png">
<style>
/* ============================================================
   GoalFlow - Holographic UI / Liquid Glassmorphism
   Ultra-clean geometric design, Post-text interface
   ============================================================ */

:root {
  --holo-blue: #4D9AEC;
  --holo-cyan: #4FD1C5;
  --holo-white: #FFFFFF;
  --holo-silver: #A0AEC0;
  
  --bg-core: #060B14;
  --text-main: #E2E8F0;
  --text-muted: #8AA2BC;
  
  --glass-bg: rgba(16, 28, 48, 0.4);
  --glass-border: rgba(100, 180, 255, 0.15);
  --glass-highlight: rgba(140, 200, 255, 0.2);
  --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
  
  --glow-cyan: 0 0 20px rgba(79, 209, 197, 0.5);
  --glow-blue: 0 0 30px rgba(77, 154, 236, 0.6);
  
  --danger: #E53E3E;
  --success: #38A169;
  --font-main: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, sans-serif;
  --font-mono: "SF Mono", Consolas, monospace;
  --ease: cubic-bezier(0.2, 0.8, 0.2, 1);

  --text-cyan: var(--holo-cyan);
  --text-glow-cyan: var(--glow-cyan);
}

/* ホログラフィック・ホワイト (Light Mode) */
[data-theme="light"] {
  --bg-core: #F5F9FD;
  --text-main: #1A2B4C;
  --text-muted: #6482A5;
  
  --glass-bg: rgba(255, 255, 255, 0.65);
  --glass-border: rgba(255, 255, 255, 1);
  --glass-highlight: rgba(255, 255, 255, 0.8);
  --glass-shadow: 0 10px 40px rgba(77, 154, 236, 0.15);
  
  --glow-cyan: 0 0 20px rgba(79, 209, 197, 0.3);
  --glow-blue: 0 0 25px rgba(77, 154, 236, 0.35);

  --text-cyan: #285E61; 
  --text-glow-cyan: none;
}

/* Reset & Mobile Bounce Lock */
* { box-sizing: border-box; margin: 0; padding: 0; }

/* Accessibility: visible keyboard focus (not shown for mouse/touch). */
:focus { outline: none; }
:focus-visible { outline: 2px solid var(--holo-cyan); outline-offset: 2px; border-radius: 6px; }

/* Accessibility: respect reduced-motion — disable decorative animations. */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.001ms !important; animation-iteration-count: 1 !important;
    transition-duration: 0.001ms !important; scroll-behavior: auto !important;
  }
}
html {
  height: 100%; overflow: hidden;
  background-color: var(--bg-core);
  /* Full holographic background painted on the ROOT element so it propagates to
     the canvas, which covers the ENTIRE physical screen (incl. the iOS home-bar
     strip) far more reliably than any fixed-positioned layer. A baked-in bottom
     fade melts the lower edge into solid bg-core, making it pixel-identical to
     the solid strip iOS paints there → zero visible seam. */
  background-image:
    linear-gradient(to bottom, transparent 78%, var(--bg-core) 91%),
    radial-gradient(circle at 15% 20%, rgba(79, 209, 197, 0.15), transparent 50%),
    radial-gradient(circle at 85% 80%, rgba(77, 154, 236, 0.15), transparent 50%),
    repeating-linear-gradient(0deg, transparent 0 40px, rgba(120, 180, 255, 0.025) 40px 41px),
    repeating-linear-gradient(90deg, transparent 0 40px, rgba(120, 180, 255, 0.025) 40px 41px);
  transition: background-color 0.4s var(--ease);
}
body {
  position: fixed; top: 0; right: 0; bottom: 0; left: 0;
  font-family: var(--font-main); color: var(--text-main); background-color: transparent;
  overflow: hidden; -webkit-font-smoothing: antialiased; -webkit-tap-highlight-color: transparent;
  transition: color 0.4s var(--ease);
}

/* App Layout */
#app { display: flex; flex-direction: column; height: 100%; width: 100%; position: relative; overflow: hidden; }
.app__main {
  height: 100%; width: 100%; overflow-y: auto; overflow-x: hidden;
  padding: calc(24px + env(safe-area-inset-top)) 20px calc(88px + env(safe-area-inset-bottom));
  -webkit-overflow-scrolling: touch; scroll-behavior: smooth;
}
.app__inner { max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }

/* Floating Navigation (見切れ防止・均等配置) */
.nav {
  position: fixed; bottom: calc(8px + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%); z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  width: calc(100% - 24px); max-width: 480px;
  padding: 8px 16px; border-radius: 99px; gap: 4px;
  background: var(--glass-bg); backdrop-filter: blur(28px) saturate(140%); -webkit-backdrop-filter: blur(28px) saturate(140%);
  border: 1px solid var(--glass-border); border-top: 1px solid var(--glass-highlight); box-shadow: var(--glass-shadow), 0 20px 40px rgba(0,0,0,0.15);
  overflow-x: auto; -webkit-overflow-scrolling: touch; -ms-overflow-style: none; scrollbar-width: none;
}
.nav::-webkit-scrollbar { display: none; }
.nav__item {
  flex: 0 0 auto; width: 42px; height: 42px; min-width: 42px; border-radius: 50%; display: grid; place-items: center;
  color: var(--text-muted); cursor: pointer; transition: all 0.3s var(--ease); position: relative;
  appearance: none; -webkit-appearance: none; background: transparent; border: none; font: inherit; padding: 0;
}
.nav__item:hover { color: var(--text-main); }
.nav__item.is-active {
  color: var(--holo-cyan); background: rgba(79, 209, 197, 0.15);
  box-shadow: inset 0 0 10px rgba(79, 209, 197, 0.2); filter: drop-shadow(0 0 4px rgba(79, 209, 197, 0.4));
}

/* Theme Toggle Button (Top Right) */
.theme-toggle {
  position: fixed; top: calc(20px + env(safe-area-inset-top)); right: 20px; z-index: 150;
  width: 46px; height: 46px; border-radius: 50%; display: grid; place-items: center;
  background: var(--glass-bg); backdrop-filter: blur(20px); border: 1px solid var(--glass-border);
  color: var(--text-main); cursor: pointer; box-shadow: var(--glass-shadow); transition: all 0.3s var(--ease);
}
.theme-toggle:active { transform: scale(0.9); }

/* Glass Panels */
.glass-panel {
  background: var(--glass-bg); backdrop-filter: blur(24px) saturate(130%); -webkit-backdrop-filter: blur(24px) saturate(130%);
  border: 1px solid var(--glass-border); border-top: 1px solid var(--glass-highlight); border-left: 1px solid var(--glass-highlight);
  border-radius: 24px; padding: 24px; box-shadow: var(--glass-shadow); position: relative; overflow: hidden;
  transition: background 0.4s, border-color 0.4s, box-shadow 0.4s;
}
.glass-panel--sm { padding: 18px; border-radius: 18px; }

/* Real-time Holographic Clock */
.holo-clock-panel {
  background: rgba(16, 28, 48, 0.3); border: 1px solid var(--glass-border); border-radius: 24px; padding: 20px;
  backdrop-filter: blur(10px); box-shadow: var(--glow-blue), inset 0 0 15px rgba(77, 154, 236, 0.2);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}
[data-theme="light"] .holo-clock-panel {
  background: rgba(255, 255, 255, 0.4); box-shadow: 0 0 20px rgba(77,154,236,0.2), inset 0 0 15px rgba(255,255,255,0.6);
}
.holo-clock-time {
  font-family: "Courier New", Courier, monospace; font-size: 3rem; font-weight: 300; color: var(--holo-white);
  text-shadow: 0 0 10px rgba(255,255,255,0.6), 0 0 20px var(--holo-cyan), 0 0 40px var(--holo-blue);
  letter-spacing: 0.1em; line-height: 1;
}
[data-theme="light"] .holo-clock-time { color: var(--text-cyan); text-shadow: 0 0 10px rgba(255, 255, 255, 0.8), 0 0 20px rgba(79, 209, 197, 0.5); }
.holo-clock-date { font-size: 0.85rem; letter-spacing: 0.2em; color: var(--holo-cyan); text-shadow: var(--glow-cyan); margin-top: 6px; font-weight: 600; }
[data-theme="light"] .holo-clock-date { color: var(--text-cyan); text-shadow: none; }

/* UI Primitives */
.module-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.holo-icon-group { display: flex; align-items: center; gap: 12px; }
.holo-icon {
  width: 40px; height: 40px; border-radius: 12px; display: grid; place-items: center;
  background: rgba(77, 154, 236, 0.15); color: var(--holo-blue); border: 1px solid rgba(77, 154, 236, 0.3); box-shadow: var(--glow-blue);
  flex-shrink: 0;
}
.holo-data { font-family: var(--font-mono); font-size: 1.3rem; font-weight: 600; letter-spacing: 0.05em; }
.holo-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); font-weight: 700; margin-top: 6px; }

/* Glass Buttons & Inputs */
.glass-btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 14px 20px; border-radius: 16px; font-weight: 600; font-size: 0.95rem;
  background: rgba(120,180,255,0.1); border: 1px solid var(--glass-border); color: var(--text-main); cursor: pointer; transition: all 0.2s var(--ease); backdrop-filter: blur(10px);
}
[data-theme="light"] .glass-btn { background: rgba(255,255,255,0.7); }
.glass-btn:active { transform: scale(0.96); }

.glass-btn--primary { 
  background: linear-gradient(135deg, rgba(77,154,236,0.8), rgba(79,209,197,0.8)); 
  color: #ffffff !important; border-color: rgba(255,255,255,0.6); 
  box-shadow: 0 8px 20px rgba(77,154,236,0.3), inset 0 1px 0 rgba(255,255,255,0.5); 
}
[data-theme="light"] .glass-btn--primary {
  background: linear-gradient(135deg, rgba(77,154,236,0.95), rgba(79,209,197,0.95)) !important;
  color: #ffffff !important;
}

.glass-btn--danger { color: var(--danger); border-color: rgba(229, 62, 62, 0.3); }
[data-theme="light"] .glass-btn--danger { background: rgba(229, 62, 62, 0.1); color: var(--danger); }

.glass-btn--icon { width: 48px; height: 48px; padding: 0; border-radius: 50%; flex-shrink: 0; }
.glass-btn--block { width: 100%; }

.glass-input, .glass-select, .glass-textarea {
  width: 100%; padding: 14px 18px; border-radius: 14px; background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border);
  color: var(--text-main); font-family: var(--font-main); font-size: 1rem; transition: all 0.2s;
}
[data-theme="light"] .glass-input, [data-theme="light"] .glass-select, [data-theme="light"] .glass-textarea { background: rgba(255,255,255,0.6); color: #1A2B4C;}
.glass-select option { background: var(--bg-core); color: var(--text-main); }

.glass-textarea { resize: vertical; min-height: 80px; }
.glass-input:focus, .glass-select:focus, .glass-textarea:focus { outline: none; border-color: var(--holo-cyan); box-shadow: var(--glow-cyan); background: rgba(0,0,0,0.3); }
[data-theme="light"] .glass-input:focus, [data-theme="light"] .glass-select:focus { background: #fff; }
.glass-input::placeholder, .glass-textarea::placeholder { color: var(--text-muted); }

/* Holo Lists & Checkboxes */
.holo-list { display: flex; flex-direction: column; gap: 12px; }
.holo-item {
  display: flex; align-items: center; gap: 14px; padding: 14px 18px; border-radius: 16px;
  background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.05); transition: all 0.2s;
}
[data-theme="light"] .holo-item { background: rgba(255,255,255,0.6); border-color: var(--glass-border); }
.holo-item.is-done { opacity: 0.5; filter: grayscale(1); }
.holo-item__text { flex: 1; font-weight: 500; font-size: 0.95rem; }
.check-btn { appearance: none; -webkit-appearance: none; background: transparent; border: none; padding: 0; margin: 0; cursor: pointer; display: flex; flex-shrink: 0; }
.holo-checkbox { width: 26px; height: 26px; border-radius: 8px; border: 2px solid var(--text-muted); display: grid; place-items: center; color: transparent; transition: 0.2s; cursor: pointer; flex-shrink: 0; }
.holo-checkbox.is-on { background: var(--holo-cyan); border-color: var(--holo-cyan); color: #fff; box-shadow: var(--glow-cyan); }

/* SVG Radial Progress */
.radial-progress { transform: rotate(-90deg); filter: drop-shadow(0 0 6px rgba(79, 209, 197, 0.4)); }
.radial-bg { fill: none; stroke: rgba(255,255,255,0.1); }
[data-theme="light"] .radial-bg { stroke: rgba(0,0,0,0.1); }
.radial-fg { fill: none; stroke: var(--holo-cyan); stroke-linecap: round; transition: stroke-dashoffset 0.8s var(--ease); }

/* Linear Progress Bar (goal metric) */
.line-bar-wrap { width: 100%; height: 8px; border-radius: 99px; background: rgba(0,0,0,0.25); border: 1px solid var(--glass-border); overflow: hidden; }
[data-theme="light"] .line-bar-wrap { background: rgba(0,0,0,0.08); }
.line-bar-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, var(--holo-cyan), var(--holo-blue)); box-shadow: var(--glow-cyan); transition: width 0.6s var(--ease); }

/* ----- 1. Goal Core (Home) ----- */
.goal-core-wrapper { position: relative; height: 260px; display: flex; align-items: center; justify-content: center; margin: 10px 0; }
.goal-core { position: relative; width: 160px; height: 160px; display: grid; place-items: center; }

/* Orbit Lines */
.core-orbit { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border-radius: 50%; border: 1px solid rgba(255,255,255,0.1); pointer-events: none;}
[data-theme="light"] .core-orbit { border: 1px solid rgba(77, 154, 236, 0.4); }

.core-orbit-1 { width: 220px; height: 220px; border-top: 2px solid var(--holo-cyan); animation: spin 10s linear infinite; }
[data-theme="light"] .core-orbit-1 { border-top: 2px solid var(--text-cyan); }
.core-orbit-2 { width: 280px; height: 280px; border-bottom: 2px solid var(--holo-blue); border-left: 2px solid var(--holo-blue); animation: spin 15s linear infinite reverse; }
[data-theme="light"] .core-orbit-2 { border-bottom: 2px solid var(--holo-blue); border-left: 2px solid var(--holo-blue); }

.core-sphere {
  width: 120px; height: 120px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.9), var(--holo-blue));
  box-shadow: 0 0 40px rgba(77,154,236,0.5), inset 0 0 20px rgba(255,255,255,1); display: flex; flex-direction: column; align-items: center; justify-content: center; color: #fff; z-index: 10;
  animation: float 4s ease-in-out infinite; border: 1px solid rgba(255,255,255,0.8);
}
[data-theme="light"] .core-sphere {
  background: radial-gradient(circle at 30% 30%, #FFFFFF, rgba(77, 154, 236, 0.2));
  color: var(--text-main); box-shadow: 0 0 30px rgba(77,154,236,0.3), inset 0 0 20px rgba(255,255,255,0.8);
}

.core-level { font-family: var(--font-mono); font-size: 2.2rem; font-weight: 300; text-shadow: 0 2px 10px rgba(0,0,0,0.2); line-height: 1; }
[data-theme="light"] .core-level { text-shadow: none; font-weight: 500; }

.core-stats { position: absolute; bottom: 0; display: flex; gap: 24px; }
.core-stat-badge { display: flex; align-items: center; gap: 6px; background: var(--glass-bg); backdrop-filter: blur(10px); padding: 6px 12px; border-radius: 99px; border: 1px solid var(--glass-border); font-family: var(--font-mono); font-size: 0.8rem; font-weight: 600; }
@keyframes spin { 100% { transform: translate(-50%, -50%) rotate(360deg); } }
@keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }

/* ----- 2. Circuit Map ----- */
.circuit-container {
  position: relative; width: 100%; height: 420px; background: rgba(0,0,0,0.2); border-radius: 20px; overflow: hidden;
  border: 1px solid var(--glass-border); box-shadow: inset 0 0 20px rgba(0,0,0,0.5); overflow-x: auto; overflow-y: auto;
}
[data-theme="light"] .circuit-container { background: rgba(255,255,255,0.3); box-shadow: inset 0 0 20px rgba(0,0,0,0.05); }
.circuit-svg { position: absolute; top: 0; left: 0; pointer-events: none; }
.circuit-path { fill: none; stroke: rgba(160,174,192,0.3); stroke-width: 2px; stroke-linecap: round; stroke-linejoin: round; transition: all 0.5s; }
.circuit-path.is-active { stroke: var(--holo-cyan); stroke-width: 3px; stroke-dasharray: 8 12; animation: energyFlow 1.2s linear infinite; filter: drop-shadow(0 0 6px var(--holo-cyan)); }
@keyframes energyFlow { from { stroke-dashoffset: 40; } to { stroke-dashoffset: 0; } }

.circuit-node { position: absolute; transform: translate(-50%, -50%); display: flex; flex-direction: column; align-items: center; gap: 8px; z-index: 10; }
.node-crystal {
  width: 34px; height: 34px; transform: rotate(45deg); background: var(--glass-bg); backdrop-filter: blur(4px);
  border: 2px solid var(--glass-border); box-shadow: 0 0 10px rgba(0,0,0,0.1); cursor: pointer; transition: all 0.3s; display: grid; place-items: center; color: transparent;
}
.node-crystal > svg { transform: rotate(-45deg); width: 16px; height: 16px; color: var(--text-muted); transition: 0.3s;}
.node-crystal:hover { transform: rotate(45deg) scale(1.15); border-color: var(--holo-blue); box-shadow: var(--glow-blue);}
.node-crystal.is-done { background: rgba(79, 209, 197, 0.25); border-color: var(--holo-cyan); box-shadow: var(--glow-cyan); }
.node-crystal.is-done > svg { color: var(--holo-cyan); }
.node-crystal.is-root { width: 56px; height: 56px; border-radius: 50%; transform: none; background: var(--holo-blue); border: none; box-shadow: 0 0 25px rgba(77, 154, 236, 0.6); }
.node-crystal.is-root > svg { transform: none; color: #fff; width: 28px; height: 28px; }
.node-crystal.is-root.is-done { background: var(--holo-cyan); box-shadow: 0 0 30px rgba(79, 209, 197, 0.8); }
.node-label { font-size: 0.75rem; font-weight: 600; background: var(--glass-bg); backdrop-filter: blur(10px); padding: 4px 10px; border-radius: 8px; border: 1px solid var(--glass-border); white-space: nowrap; }

/* ----- 3. Water Timer (Extremely Pale & Smooth) ----- */
.water-wrap {
  position: relative; width: min(76vw, 300px); aspect-ratio: 1; border-radius: 50%;
  background: rgba(0,0,0,0.3); overflow: hidden; border: 4px solid var(--glass-border);
  box-shadow: 0 0 40px rgba(77, 154, 236, 0.2), inset 0 0 40px rgba(0,0,0,0.5); margin: 0 auto;
}
[data-theme="light"] .water-wrap { background: rgba(255,255,255,0.4); box-shadow: 0 0 40px rgba(77, 154, 236, 0.2), inset 0 0 20px rgba(0,0,0,0.1); }

.water-fill {
  position: absolute; left: -5%; right: -5%; bottom: -5%; width: 110%; height: 110%;
  transform-origin: bottom; transition: none; will-change: transform; overflow: hidden;
  background: linear-gradient(180deg,
    rgba(140,240,228,0.11) 0%,
    rgba(79,209,197,0.15) 30%,
    rgba(77,154,236,0.19) 66%,
    rgba(96,132,242,0.29) 100%);
  box-shadow: inset 0 40px 60px -30px rgba(190,255,250,0.30);
}
/* 揺らめく光（コースティクス）— 水中の光。網目の代わり */
.water-fill::before {
  content: ''; position: absolute; inset: -30%; pointer-events: none;
  background:
    radial-gradient(ellipse 55% 38% at 28% 24%, rgba(195,255,250,0.30), transparent 62%),
    radial-gradient(ellipse 50% 32% at 74% 50%, rgba(150,225,255,0.22), transparent 60%),
    radial-gradient(ellipse 42% 30% at 48% 80%, rgba(120,205,255,0.16), transparent 62%);
  filter: blur(12px);
  animation: caustics 9s ease-in-out infinite alternate;
}
@keyframes caustics {
  0%   { transform: translate(0,0) scale(1); opacity: 0.8; }
  100% { transform: translate(8%, -6%) scale(1.14); opacity: 1; }
}
/* 斜めのガラス的な反射（ホログラム感） */
.water-fill::after {
  content: ''; position: absolute; inset: 0; pointer-events: none;
  background: linear-gradient(115deg, transparent 35%, rgba(255,255,255,0.10) 48%, transparent 60%);
  mix-blend-mode: screen;
}
[data-theme="light"] .water-fill { background: linear-gradient(180deg, rgba(79,209,197,0.16), rgba(77,154,236,0.22), rgba(77,154,236,0.30)); }

.water-fill .wave { position: absolute; top: -19px; left: 0; width: 200%; height: 26px; display: block; }
.wave--a { animation: waveflow 6s linear infinite; fill: rgba(150,245,232,0.6); filter: drop-shadow(0 0 7px rgba(79,209,197,0.7)); }
.wave--b { animation: waveflow 4.2s linear infinite reverse; top: -12px; fill: rgba(96,168,240,0.45); }

/* 立ち上る気泡 */
.water-fill .bubble {
  position: absolute; bottom: -4%; border-radius: 50%;
  background: radial-gradient(circle at 35% 30%, rgba(255,255,255,0.95), rgba(190,245,255,0.35) 55%, transparent 75%);
  box-shadow: 0 0 6px rgba(190,245,255,0.5);
  opacity: 0; pointer-events: none; animation: rise linear infinite;
}
@keyframes rise {
  0%   { transform: translateY(0) scale(0.5); opacity: 0; }
  12%  { opacity: 0.85; }
  80%  { opacity: 0.55; }
  100% { transform: translateY(-340px) scale(1.05); opacity: 0; }
}

/* Hologram Timer Text */
.timer-face { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; pointer-events: none;}
.timer-display-box {
  background: rgba(16, 28, 48, 0.3); border: 1px solid rgba(79, 209, 197, 0.3);
  padding: 12px 28px; border-radius: 16px; backdrop-filter: blur(8px);
  box-shadow: 0 4px 20px rgba(0,0,0,0.3), inset 0 0 20px rgba(79, 209, 197, 0.1);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}
[data-theme="light"] .timer-display-box {

const BGM_FILES = [
  { id: 'rain', nm: 'Rain', src: 'rain_against_the_glass.mp3', ico: 'droplet' },
  { id: 'notes', nm: 'Notes', src: 'notes_against_the_glass.mp3', ico: 'music' },
  { id: 'city', nm: 'City Wakes', src: 'before_the_city_wakes.mp3', ico: 'sun' },
  { id: 'cold', nm: 'Cold', src: 'keeping_out_the_cold.mp3', ico: 'moon' },
];

const AudioEngine = (() => {
  let vol = 0.6;
  let chimeCtx = null;

  function initChime() {
    if (!chimeCtx) {
      const AC = window.AudioContext || window.webkitAudioContext;
      if (AC) chimeCtx = new AC();
    }
    if (chimeCtx && chimeCtx.state === 'suspended') chimeCtx.resume();
  }

  return {
    setVolume(v) { 
      vol = v; 
      const el = document.getElementById('bgm-player');
      if (el) el.volume = v; 
    },
    play(id) {
      initChime();
      const file = BGM_FILES.find(f => f.id === id);
      if (!file) return false;
      
      const el = document.getElementById('bgm-player');
      if (!el) return false;

      // One-time diagnostics: surface decode/network errors for the bundled audio files.
      if (!el.dataset.errHook) {
        el.dataset.errHook = '1';
        el.addEventListener('error', () => {
          const err = el.error;
          console.warn('Audio load error for', el.currentSrc || el.src, err ? '(code ' + err.code + ')' : '');
        });
      }
      
      if (el.dataset.currentId !== id) {
        el.src = file.src;
        el.dataset.currentId = id;
        el.load(); // ensure the newly selected bundled track is (re)loaded before playback
      }
      el.volume = vol;
      const p = el.play();
      if (p !== undefined) {
        p.catch(e => console.warn('Audio Autoplay Blocked:', e));
      }
      return true;
    },
    stop() {
      const el = document.getElementById('bgm-player');
      if (el) el.pause();
    },
    toggle(id) {
      const el = document.getElementById('bgm-player');
      if (!el) return false;
      if (!el.paused && el.dataset.currentId === id) { 
        this.stop(); return false; 
      }
      return this.play(id);
    },
    chime() {
      initChime();
      if (!chimeCtx) return;
      try {
        const osc = chimeCtx.createOscillator(); const gain = chimeCtx.createGain();
        osc.connect(gain); gain.connect(chimeCtx.destination);
        osc.type = 'sine'; osc.frequency.setValueAtTime(880, chimeCtx.currentTime);
        gain.gain.setValueAtTime(0.5, chimeCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, chimeCtx.currentTime + 1.5);
        osc.start(); osc.stop(chimeCtx.currentTime + 1.5);
      } catch(e) {}
    },
    isPlaying(id) {
      const el = document.getElementById('bgm-player');
      if (!el) return false;
      if (id) return !el.paused && el.dataset.currentId === id;
      return !el.paused;
    }
  };
})();

/* ============================================================
   AI Coach — BYOK (Bring Your Own Key) Claude API client
   - APIキーは reducer state ではなく専用の localStorage キーに保存する。
     こうすることで Settings の JSON エクスポートに鍵が混入しない（プライバシー）。
   - ブラウザから api.anthropic.com を直接呼ぶ（バックエンド無しの設計を維持）。
     CORS のため anthropic-dangerous-direct-browser-access ヘッダが必要。
   - 鍵が無い/オフライン/エラーでもアプリ本体は壊れない（優雅な劣化）。
   ============================================================ */
const APIKEY_STORE = 'goalflow:anthropic_key';
const ApiKeyStore = {
  get() { try { return localStorage.getItem(APIKEY_STORE) || ''; } catch (e) { return ''; } },
  set(v) { try { v ? localStorage.setItem(APIKEY_STORE, v) : localStorage.removeItem(APIKEY_STORE); } catch (e) {} },
  has() { return !!this.get(); }
};

/* AIコーチのバックエンドproxy URL。
   ここに自分の Cloudflare Worker 等のURLを入れて公開すると、
   アプリ利用者は「APIキー入力なし」でAIコーチを使える（鍵はサーバー秘密で保持）。
   空のままなら従来どおり BYOK（各自のキー）にフォールバックする。
   例: const AI_PROXY_URL = 'https://goalflow-ai.example.workers.dev';
   ※このURL自体は秘密ではない（秘密の鍵はproxyサーバー側に置く）。デプロイ手順は ai-proxy/README.md。 */
const AI_PROXY_URL = '';

/* 応援（寄付）リンク。オーナーが自分のアカウントURLを入れると、設定画面に「応援する」
   ボタンが表示される（未設定の項目は非表示）。全て任意・押し付けない方針（North Star）。
   作り方は MONETIZE.md を参照。例:
     kofi:   'https://ko-fi.com/yourname'
     bmac:   'https://www.buymeacoffee.com/yourname'
     github: 'https://github.com/sponsors/yourname'
     paypal: 'https://www.paypal.me/yourname' */
const SUPPORT = {
  kofi: '',
  bmac: '',
  github: '',
  paypal: ''

const ClaudeAPI = (() => {
  const ENDPOINT = 'https://api.anthropic.com/v1/messages';
  const MODEL = 'claude-opus-4-8';

  // proxy があれば proxy 経由（鍵不要）。無ければ各自の鍵で直接 Anthropic を叩く。
  function usingProxy() { return !!AI_PROXY_URL; }
  function available() { return usingProxy() || ApiKeyStore.has(); }
  function buildReq(body, stream) {
    const payload = JSON.stringify({ model: MODEL, ...(stream ? { stream: true } : {}), ...body });
    if (usingProxy()) {
      return { url: AI_PROXY_URL, init: { method: 'POST', headers: { 'content-type': 'application/json' }, body: payload } };
    }
    const key = ApiKeyStore.get();
    if (!key) { const e = new Error('APIキーが未設定です'); e.code = 'NO_KEY'; throw e; }
    return { url: ENDPOINT, init: { method: 'POST', headers: {
      'content-type': 'application/json',
      'x-api-key': key,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    }, body: payload } };
  }

  async function call(body) {
    const { url, init } = buildReq(body, false);
    let res;
    try {
      res = await fetch(url, init);
    } catch (netErr) {
      const e = new Error('通信に失敗しました（オフラインの可能性）'); e.code = 'NETWORK'; throw e;
    }
    if (!res.ok) {
      let msg = `エラー (HTTP ${res.status})`;
      try { const j = await res.json(); if (j && j.error && j.error.message) msg = j.error.message; } catch (e) {}
      if (res.status === 401) msg = usingProxy() ? 'AIサーバーの認証に失敗しました（管理者の設定をご確認ください）。' : 'APIキーが無効です。設定を確認してください。';
      const e = new Error(msg); e.code = 'HTTP'; e.status = res.status; throw e;
    }
    return res.json();
  }

  // SSE ストリーミング呼び出し。content_block_delta の text_delta を順次 onDelta に渡し、
  // 最終的な全文を返す。SDK 不使用のため fetch の ReadableStream を自前でパースする。
  async function callStream(body, onDelta) {
    const { url, init } = buildReq(body, true);
    let res;
    try {
      res = await fetch(url, init);
    } catch (netErr) {
      const e = new Error('通信に失敗しました（オフラインの可能性）'); e.code = 'NETWORK'; throw e;
    }
    if (!res.ok) {
      let msg = `エラー (HTTP ${res.status})`;
      try { const j = await res.json(); if (j && j.error && j.error.message) msg = j.error.message; } catch (e) {}
      if (res.status === 401) msg = usingProxy() ? 'AIサーバーの認証に失敗しました（管理者の設定をご確認ください）。' : 'APIキーが無効です。設定を確認してください。';
      const e = new Error(msg); e.code = 'HTTP'; e.status = res.status; throw e;
    }
    if (!res.body || !res.body.getReader) {
      // ストリーム非対応環境向けフォールバック（テキストを丸ごと読む）。
      const txt = await res.text();
      let full = '';
      txt.split('\n').forEach(line => {
        line = line.trim();
        if (!line.startsWith('data:')) return;
        try { const ev = JSON.parse(line.slice(5).trim()); if (ev.type === 'content_block_delta' && ev.delta && ev.delta.type === 'text_delta') { full += ev.delta.text; if (onDelta) onDelta(full); } } catch (e) {}
      });
      return full;
    }
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '', full = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      let idx;
      while ((idx = buffer.indexOf('\n')) >= 0) {
        const line = buffer.slice(0, idx).trim();
        buffer = buffer.slice(idx + 1);
        if (!line.startsWith('data:')) continue;
        const payload = line.slice(5).trim();
        if (!payload || payload === '[DONE]') continue;
        let ev;
        try { ev = JSON.parse(payload); } catch (e) { continue; }
        if (ev.type === 'content_block_delta' && ev.delta && ev.delta.type === 'text_delta') {
          full += ev.delta.text;
          if (onDelta) onDelta(full);
        } else if (ev.type === 'error') {
          const e = new Error((ev.error && ev.error.message) || 'ストリーミングエラー'); e.code = 'STREAM'; throw e;
        }
      }
    }
    return full;
  }

  function textOf(data) {
    const b = (data && data.content || []).find(x => x.type === 'text');
    return b ? b.text : '';
  }

  const DECOMP_SYS =
    'あなたは行動科学に基づく目標達成コーチです。ユーザーの目標を、達成しやすい構造へ分解します。' +
    '根拠: 目標設定理論(Locke & Latham、具体的で挑戦的)、目標の階層分解(目標→マイルストーン→今週の行動→今日の2分の一歩)、' +
    '実行意図/if-then(Gollwitzer)、2分ルール(Fogg)。' +
    '出力は必ず指定のJSONスキーマに厳密に従い、日本語で、具体的かつ実行可能に。' +
    'today_step は「2分でできる」極小の一歩にし、cue は「Xしたら」の形の実行のきっかけにする。' +
    '励ましは短く、罪悪感を与えない。';

  const CHAT_SYS =
    'あなたは行動科学に基づく目標達成コーチです。壁打ち・具体化・つまずきの診断と再起動・振り返りを行います。' +
    '責めず、共感的に、そして実用的に。つまずいた時はハードルを下げた次の一歩を一緒に見つけます。' +
    '簡潔に日本語で答え、必要なら具体的な「次の2分の一歩」を提案します。' +
    'ダークパターン・通知スパム・依存や罪悪感を煽る発言はしません。ユーザーの長期的な幸福を最優先します。';

  return {
    available, usingProxy,
    async decompose({ title, deadline, identity }) {
      const schema = {
        type: 'object',
        properties: {
          restated_goal: { type: 'string', description: 'より具体的に言い換えた目標' },
          milestones: {
            type: 'array',
            items: {
              type: 'object',
              properties: { title: { type: 'string' }, why: { type: 'string' } },
              required: ['title', 'why'],
              additionalProperties: false
            }
          },
          week_actions: { type: 'array', items: { type: 'string' } },
          today_step: {
            type: 'object',
            properties: { title: { type: 'string' }, cue: { type: 'string' } },
            required: ['title', 'cue'],
            additionalProperties: false
          },
          encouragement: { type: 'string' }
        },
        required: ['restated_goal', 'milestones', 'week_actions', 'today_step', 'encouragement'],
        additionalProperties: false
      };
      const user =
        `目標: ${title}\n期限: ${deadline || '未設定'}\nなりたい自分: ${identity || '未設定'}\n今日: ${today()}\n\n` +
        'この目標を分解してください。マイルストーンは3〜5個、今週の行動(week_actions)は3個程度、' +
        'today_step は2分でできる具体的な最初の一歩にしてください。';
      const data = await call({
        max_tokens: 2000,
        system: DECOMP_SYS,
        messages: [{ role: 'user', content: user }],
        output_config: { format: { type: 'json_schema', schema } }
      });
      const txt = textOf(data);
      try { return JSON.parse(txt); }
      catch (e) { const err = new Error('AIの応答を解析できませんでした'); err.code = 'PARSE'; throw err; }
    },

    async chat(history, context) {
      const data = await call({
        max_tokens: 1024,
        system: CHAT_SYS + '\n\n# ユーザーの現在の状況（参考）\n' + context,
        messages: history
      });
      return textOf(data);
    },

    // ストリーミング版。onDelta(全文) が逐次呼ばれ、完了時に全文を返す。
    async chatStream(history, context, onDelta) {
      return callStream({
        max_tokens: 1024,
        system: CHAT_SYS + '\n\n# ユーザーの現在の状況（参考）\n' + context,
        messages: history
      }, onDelta);
    }
  };
})();

/* ============================================================
   State Management (Clean Start)

    settings: { theme: 'dark', soundVolume: 0.6, bgmPreset: 'rain' },
    goals: [],
    tasks: [],
    monthGoals: {},
    maps: [], 
    cards: [],
    timer: { lastDurationMin: 25, sessions: [] },
    activeTimerTarget: null,
    xp: 0, level: 1, streak: 0, lastActiveDate: null,
    identity: '', onboarded: false
  };
}

/* 初回オンボーディングを出すべきか。既存データがあれば「もう使っている人」と見なし出さない。 */
function shouldOnboard(state) {
  if (state.onboarded === true) return false;
  const used = (state.goals && state.goals.length) ||
               (state.tasks && state.tasks.length) ||
               (state.cards && state.cards.length) ||
               (state.monthGoals && Object.keys(state.monthGoals).length);
  return !used;
}

/* ------------------------------------------------------------
   Streak with a grace day ("二度は休まない" rule)
   - 連続で記録すれば +1。1日だけ空けても継続は途切れない（グレース）。
   - 2日以上連続で空けたら 1 から再スタート。
   - 「活動した日」= タスク完了・集中セッション記録・カード復習 のいずれか。
   bumpStreak は活動が起きた瞬間にだけ呼ぶ。reconcileStreak はアプリ起動時に
   「もう途切れている」場合だけ表示を 0 に戻す（嘘をつかないため）。
   ------------------------------------------------------------ */
function bumpStreak(state) {
  const t = today();
  const last = state.lastActiveDate;
  if (last === t) return state; // 今日はもう加算済み
  let streak;
  if (!last) {
    streak = 1;
  } else {
    const gap = dayDiff(last, t);
    if (gap === 1 || gap === 2) streak = (state.streak || 0) + 1; // 連続 or 1日グレース
    else streak = 1; // 2日以上空いた → 再スタート
  }
  return { ...state, streak, lastActiveDate: t };
}

function reconcileStreak(state) {
  if (!state || !state.lastActiveDate) return state;
  const gap = dayDiff(state.lastActiveDate, today());
  // 1日（昨日）や2日（グレース）はまだ生きている。3日以上空いたら途切れ。
  if (gap >= 3 && state.streak !== 0) return { ...state, streak: 0 };
  return state;
}

/* ------------------------------------------------------------
   オートプラン: 目標と期限から「今日〜期限」のタスクをカレンダーへ自動配置する。
   APIキー不要・無料・オフラインで動く決定論的スケジューラ。
   行動科学: 最初は今日の「2分の一歩」(Fogg)＋if-thenきっかけ(Gollwitzer)、
   最後は総仕上げ。頻度は毎日/平日/週3/週1から選べる。
   ------------------------------------------------------------ */
const CADENCE = {
  daily:    { label: '毎日',           keep: () => true },
  weekdays: { label: '平日（月〜金）',   keep: (dow) => dow >= 1 && dow <= 5 },
  mwf:      { label: '週3回（月・水・金）', keep: (dow) => dow === 1 || dow === 3 || dow === 5 },
  weekly:   { label: '週1回（月曜）',    keep: (dow) => dow === 1 }
};

function planTaskDates(startDS, endDS, cadence) {
  const keep = (CADENCE[cadence] || CADENCE.daily).keep;
  const out = [];
  let d = startDS, guard = 0;
  while (dayDiff(d, endDS) >= 0 && guard < 800) {
    const dow = new Date(d + 'T00:00:00').getDay();
    if (keep(dow)) out.push(d);
    d = addDays(d, 1); guard++;
  }
  return out;
}

function planGoal({ title, deadline, cadence = 'daily', perSession = '', today: t }) {
  t = t || today();
  const safeTitle = (title || '目標').trim() || '目標';
  let dl = deadline;
  if (!dl || dayDiff(t, dl) < 0) dl = addDays(t, 30); // 期限が無い/過去なら30日後を仮定
  const dates = planTaskDates(t, dl, cadence);
  if (dates[0] !== t) dates.unshift(t); // 今日を必ず最初の一歩にする（即着手）
  const n = dates.length;
  const per = (perSession || '').trim();
  const tasks = dates.map((date, i) => {
    const task = { id: uid(), title: per || `${safeTitle}に取り組む`, date, done: false };
    if (i === 0) {
      task.title = `🌱 まず2分：${per || safeTitle + 'を始める'}`;
      task.cue = '朝の支度が終わったら';
    } else if (i === n - 1 && n > 1) {
      task.title = `🏁 総仕上げ・達成チェック：${safeTitle}`;
    }
    return task;
  });
  return { tasks, count: n, first: dates[0], last: dates[n - 1], deadline: dl, cadenceLabel: (CADENCE[cadence] || CADENCE.daily).label };
}

function reducer(state, a) {
  switch (a.type) {
    case 'TOGGLE_TASK': {
      const target = state.tasks.find(tk => tk.id === a.id);
      const becomingDone = target && !target.done;
      const next = { ...state, tasks: state.tasks.map(tk => tk.id === a.id ? { ...tk, done: !tk.done } : tk) };
      return becomingDone ? bumpStreak(next) : next;
    }
    case 'ADD_TASK':
      return { ...state, tasks: [...state.tasks, a.task] };
    case 'ADD_TASKS':
      return { ...state, tasks: [...state.tasks, ...(a.tasks || [])] };
    case 'DELETE_TASK':
      return { ...state, tasks: state.tasks.filter(tk => tk.id !== a.id) };
    
    case 'ADD_GOAL': return { ...state, goals: [...state.goals, a.goal] };
    case 'UPDATE_GOAL': return { ...state, goals: state.goals.map(g => g.id === a.goal.id ? a.goal : g) };
    case 'DELETE_GOAL': return { ...state, goals: state.goals.filter(g => g.id !== a.id) };

    case 'SET_MONTH_GOAL': {
      const mg = state.monthGoals[a.month] || { title: '', subtasks: [] };
      const mapId = `map_${a.month}`;
      
      let maps = state.maps || [];
      maps = maps.map(m => {
        if(m.id === mapId) {
          const nm = JSON.parse(JSON.stringify(m));
          nm.title = a.title || `目標 ${a.month}`;
          if (nm.nodes && nm.nodes[nm.rootId]) {
            nm.nodes[nm.rootId].text = a.title || `目標 ${a.month}`;
          }
          return nm;
        }
        return m;
      });
      return { ...state, monthGoals: { ...state.monthGoals, [a.month]: { ...mg, title: a.title } }, maps };
    }
    
    case 'ADD_MONTH_SUBTASK': {
      const m = a.month; const tkId = uid();
      const newTask = { id: tkId, title: a.title, date: today(), done: false };
      const currentMg = state.monthGoals[m] || { title: `目標 ${m}`, subtasks: [] };
      const newSubtasks = [...currentMg.subtasks, { id: uid(), title: a.title, taskId: tkId }];
      
      let maps = state.maps || [];
      const mapId = `map_${m}`;
      let map = maps.find(x => x.id === mapId);
      if (!map) {
        map = { id: mapId, title: currentMg.title || `目標 ${m}`, rootId: 'r', month: m, nodes: { r: { id: 'r', text: currentMg.title || `目標 ${m}`, children: [] } } };
        maps = [...maps, map];
      }
      const nodeId = uid();
      const nextMap = JSON.parse(JSON.stringify(map));
      nextMap.nodes[nodeId] = { id: nodeId, text: a.title, parentId: 'r', children: [], taskId: tkId };
      nextMap.nodes['r'].children.push(nodeId);
      
      return { ...state, tasks: [...state.tasks, newTask], monthGoals: { ...state.monthGoals, [m]: { ...currentMg, subtasks: newSubtasks } }, maps: maps.map(x => x.id === mapId ? nextMap : x) };
    }

    case 'UPDATE_MAP': return { ...state, maps: state.maps.map(m => m.id === a.map.id ? a.map : m) };
    case 'TOGGLE_MAP_NODE': {
      let maps = state.maps.map(m => {
        if(m.id === a.mapId) {
          const nm = JSON.parse(JSON.stringify(m));
          if(nm.nodes[a.nodeId]) {
            nm.nodes[a.nodeId].manualDone = !nm.nodes[a.nodeId].manualDone;
          }
          return nm;
        }
        return m;
      });
      return { ...state, maps };
    }
    
    case 'ADD_CARD': return { ...state, cards: [...state.cards, a.card] };
    case 'UPDATE_CARD': return { ...state, cards: state.cards.map(c => c.id === a.card.id ? a.card : c) };
    case 'DELETE_CARD': return { ...state, cards: state.cards.filter(c => c.id !== a.id) };
    case 'REVIEW_CARD': {
      const cards = state.cards.map(c => {
        if(c.id !== a.id) return c;
        let { ease = 2.5, interval = 0, reps = 0 } = c;
        
        // SM-2 Algorithm based on 4 options (2: Again, 3: Hard, 4: Good, 5: Easy)
        if (a.grade < 3) { 
          reps = 0; interval = 1; 
        } else if (a.grade === 3) {
          interval = Math.max(1, Math.round(interval * 1.2));
        } else { 
          reps += 1; 
          interval = reps === 1 ? 1 : reps === 2 ? 6 : Math.round(interval * ease); 
        }
        
        if (a.grade === 5) interval = Math.round(interval * 1.3); // Bonus for Easy
        
        ease = Math.max(1.3, ease + (0.1 - (5 - a.grade) * (0.08 + (5 - a.grade) * 0.02)));
        
        return { ...c, ease, interval, reps, due: addDays(today(), interval) };
      });
      return bumpStreak({ ...state, cards, xp: state.xp + 5 });
    }

    case 'LOG_SESSION':
      return bumpStreak({
        ...state,
        xp: state.xp + (a.durationMin * 10),
        level: Math.floor(Math.sqrt((state.xp + a.durationMin * 10) / 100)) + 1,
        timer: { ...state.timer, sessions: [...state.timer.sessions, { t: Date.now(), min: a.durationMin }] }
      });
    
    case 'SET_ACTIVE_TIMER_TARGET': return { ...state, activeTimerTarget: a.target };
    case 'SET_SETTINGS': return { ...state, settings: { ...state.settings, ...a.patch } };
    case 'SET_IDENTITY': return { ...state, identity: a.identity };
    case 'COMPLETE_ONBOARDING': {
      let next = { ...state, onboarded: true };
      if (a.identity != null) next.identity = a.identity.trim();
      if (a.goal && a.goal.title && a.goal.title.trim()) {
        next.goals = [...next.goals, { id: uid(), title: a.goal.title.trim(), deadline: a.goal.deadline || addDays(today(), 30) }];
      }
      if (a.task && a.task.title && a.task.title.trim()) {
        const tk = { id: uid(), title: a.task.title.trim(), date: today(), done: false };
        const cue = a.task.cue && a.task.cue.trim();
        if (cue) tk.cue = cue;
        next.tasks = [...next.tasks, tk];
      }
      return next;
    }
    case 'IMPORT': return { ...seed(), ...a.state };
    default: return state;
  }
}

/* ============================================================
   UI Components
   ============================================================ */
const Ctx = createContext(null);
const useApp = () => useContext(Ctx);

function Check({ on }) {
  return html`<div class="holo-checkbox ${on ? 'is-on' : ''}"><${Icon} n="check" size=16/></div>`;
}

function RadialProgress({ progress, size = 60, stroke = 6 }) {
  const r = (size - stroke) / 2;
  const c = 2 * Math.PI * r;
  const off = c * (1 - clamp(progress, 0, 1));
  return html`
    <svg class="radial-progress" width=${size} height=${size} viewBox="0 0 ${size} ${size}">
      <circle class="radial-bg" cx=${size/2} cy=${size/2} r=${r} stroke-width=${stroke}/>
      <circle class="radial-fg" cx=${size/2} cy=${size/2} r=${r} stroke-width=${stroke} stroke-dasharray=${c} stroke-dashoffset=${off}/>
    </svg>
  `;
}

function Modal({ title, icon, onClose, children }) {
  useEffect(() => {
    const onKey = (e) => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [onClose]);
  return html`
    <div class="scrim" onClick=${e => { if (e.target === e.currentTarget) onClose(); }}>
      <div class="holo-modal" role="dialog" aria-modal="true" aria-label=${title}>
        <div class="modal-grip"></div>
        <div class="module-header">
          <div class="holo-icon-group"><div class="holo-icon"><${Icon} n=${icon}/></div><div class="holo-data" style="font-size: 1.1rem; color: var(--text-cyan); text-shadow: var(--text-glow-cyan);">${title}</div></div>
          <button class="glass-btn glass-btn--icon" style="width:36px; height:36px; min-width:36px; flex-shrink:0;" aria-label="閉じる" onClick=${onClose}><${Icon} n="x" size=16/></button>
        </div>
        ${children}
      </div>
    </div>
  `;
}

// アプリ内 confirm()。中央配置の小さなダイアログ。Escape/背景クリックでキャンセル。
function ConfirmDialog({ message, onResolve }) {
  const okRef = useRef(null);
  useEffect(() => {
    if (okRef.current) okRef.current.focus();
    const onKey = (e) => { if (e.key === 'Escape') onResolve(false); };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, []);
  return html`
    <div class="scrim scrim--center" onClick=${e => { if (e.target === e.currentTarget) onResolve(false); }}>
      <div class="confirm-dialog" role="alertdialog" aria-modal="true" aria-label="確認">
        <div class="confirm-msg">${message}</div>
        <div class="confirm-actions">
          <button class="glass-btn glass-btn--block" onClick=${() => onResolve(false)}>キャンセル</button>
          <button class="glass-btn glass-btn--primary glass-btn--block" ref=${okRef} onClick=${() => onResolve(true)}>実行</button>
        </div>
      </div>
    </div>
  `;
}

// ----- CIRCUIT MAP -----
function CircuitMap({ go }) {
  const { state } = useApp();
  const [selMap, setSelMap] = useState(state.maps[0]?.id || null);
  const [actionNode, setActionNode] = useState(null);

  useEffect(() => { if (!selMap && state.maps.length > 0) setSelMap(state.maps[0].id); }, [state.maps, selMap]);
  const map = state.maps.find(m => m.id === selMap);

  const isNodeDone = useCallback((id) => {
    if (!map) return false;
    const node = map.nodes[id];
    if (!node) return false;
    if (node.taskId) {
      const task = state.tasks.find(t => t.id === node.taskId);
      if (task && task.done) return true;
    }
    return !!node.manualDone;
  }, [map, state.tasks]);

  const pos = useMemo(() => {
    if(!map) return {};
    const p = {}; const nodes = map.nodes;
    
    const depths = {};
    function calcDepth(id, d) {
      depths[id] = d;
      (nodes[id].children || []).forEach(cid => calcDepth(cid, d + 1));
    }
    calcDepth(map.rootId, 0);
    const maxDepth = Math.max(0, ...Object.values(depths));

    let currentY = 60;
    const ySpacing = 80;
    const xSpacing = 160;

    function assignY(id) {
      const ch = nodes[id]?.children || [];
      if(!ch.length) { 
        p[id] = { y: currentY }; currentY += ySpacing; 
      } else {
        let sumY = 0;
        ch.forEach(cid => { assignY(cid); sumY += p[cid].y; });
        p[id] = { y: sumY / ch.length };
      }
    }
    assignY(map.rootId);

    const rootX = maxDepth * xSpacing + 100;
    Object.keys(nodes).forEach(id => {
      const d = depths[id];
      p[id] = { ...p[id], x: rootX - (d * xSpacing) };
    });

    return p;
  }, [map]);

  const paths = [];
  if (map) {
    function trace(id) {
      const node = map.nodes[id];
      (node.children || []).forEach(cid => {
        const pParent = pos[id]; const pChild = pos[cid];
        const midX = (pParent.x + pChild.x) / 2;
        const d = `M ${pChild.x} ${pChild.y} L ${midX} ${pChild.y} L ${midX} ${pParent.y} L ${pParent.x} ${pParent.y}`;
        const isActive = isNodeDone(cid); 
        paths.push(html`<path key=${id+'-'+cid} d=${d} class="circuit-path ${isActive ? 'is-active' : ''}"/>`);
        trace(cid);
      });
    }
    trace(map.rootId);
  }

  const w = map ? Math.max(0, ...Object.values(pos).map(p => p.x)) + 120 : 0;
  const h = map ? Math.max(0, ...Object.values(pos).map(p => p.y)) + 80 : 0;

  return html`
    <div class="app__inner">
      <div class="glass-panel glass-panel--sm flex-between">
        <div class="holo-icon-group"><div class="holo-icon"><${Icon} n="branch"/></div><div class="holo-label">思考回路</div></div>
        ${state.maps.length > 0 ? html`
          <select class="glass-select" style="width: auto; padding: 6px 12px;" value=${selMap} onChange=${e => setSelMap(e.currentTarget.value)}>
            ${state.maps.map(m => html`<option key=${m.id} value=${m.id}>${m.title || m.month}</option>`)}
          </select>
        ` : null}
      </div>

      ${map ? html`
        <div class="circuit-container">
          <svg class="circuit-svg" width="${w}" height="${Math.max(420, h)}" viewBox="0 0 ${w} ${Math.max(420, h)}">
            ${paths}
          </svg>
          ${Object.keys(pos).map(id => {
            const n = map.nodes[id];
            const isDone = isNodeDone(id);
            const isRoot = id === map.rootId;
            return html`
              <div class="circuit-node" key=${id} style="left: ${pos[id].x}px; top: ${pos[id].y}px;">
                <button class="node-crystal ${isRoot ? 'is-root' : ''} ${isDone ? 'is-done' : ''}" onClick=${() => setActionNode(id)}>
                  ${isRoot ? html`<${Icon} n="grid"/>` : html`<${Icon} n="zap"/>`}
                </button>
                <div class="node-label">${n.text}</div>
              </div>
            `;
          })}
        </div>
        <div class="holo-label text-center mt-2">💡 ライトをタップして点灯・細分化</div>
      ` : html`<div class="glass-panel text-center"><div class="holo-label">回路がありません。<br/>月間目標から初期化してください。</div></div>`}

      ${actionNode && map ? html`<${ActionModal} node=${map.nodes[actionNode]} map=${map} onClose=${() => setActionNode(null)} go=${go}/>` : null}
    </div>
  `;
}

function ActionModal({ node, map, onClose, go }) {
  const { state, dispatch, addToast } = useApp();
  const task = node.taskId ? state.tasks.find(t => t.id === node.taskId) : null;
  const isDone = task ? task.done : !!node.manualDone;
  const [subTxt, setSubTxt] = useState('');

  const toggle = () => { 
    if (task) {
      dispatch({ type: 'TOGGLE_TASK', id: task.id }); 
    } else {
      const nextMap = JSON.parse(JSON.stringify(map));
      nextMap.nodes[node.id].manualDone = !nextMap.nodes[node.id].manualDone;
      dispatch({ type: 'UPDATE_MAP', map: nextMap });
    }
    onClose(); 
  };
  
  const toTimer = () => { 
    if(task) dispatch({ type: 'SET_ACTIVE_TIMER_TARGET', target: { type: 'task', id: task.id, title: node.text } });
    else dispatch({ type: 'SET_ACTIVE_TIMER_TARGET', target: { type: 'node', id: node.id, mapId: map.id, title: node.text } });
    go('timer'); 
    onClose(); 
  };

  const addSub = () => {
    if(!subTxt.trim()) return;
    const nodeId = uid();
    const nextMap = JSON.parse(JSON.stringify(map));
    nextMap.nodes[nodeId] = { id: nodeId, text: subTxt.trim(), parentId: node.id, children: [], manualDone: false };
    if (!nextMap.nodes[node.id].children) nextMap.nodes[node.id].children = [];
    nextMap.nodes[node.id].children.push(nodeId);

    dispatch({ type: 'UPDATE_MAP', map: nextMap });
    setSubTxt('');
    addToast('サブタスクを回路に追加しました', 'success');
  };

  return html`
    <${Modal} title="ノード操作" icon="zap" onClose=${onClose}>
      <div class="text-center mb-4" style="font-size:1.2rem; font-weight:600; color: var(--text-cyan); text-shadow: var(--text-glow-cyan);">${node.text}</div>
      
      <div class="holo-label mb-2">アクション</div>
      <div class="holo-list mb-4">
        <button class="glass-btn glass-btn--primary glass-btn--block" onClick=${toggle}>
          <${Icon} n="check"/> ${isDone ? '💡 ライトを消す（未完了）' : '💡 ライトを点灯する（完了）'}
        </button>
        <button class="glass-btn glass-btn--block" onClick=${toTimer}>
          <${Icon} n="timer"/> この目標で集中モードを開始
        </button>
      </div>

      <div class="holo-label mb-2">さらに細分化する（孫タスクの追加）</div>
      <div class="flex-row">
        <input class="glass-input" placeholder="サブタスクを入力..." value=${subTxt} onInput=${e => setSubTxt(e.currentTarget.value)} onKeyDown=${e => { if(e.key==='Enter') addSub(); }}/>
        <button class="glass-btn glass-btn--primary glass-btn--icon" aria-label="追加" onClick=${addSub}><${Icon} n="plus"/></button>
      </div>
    </${Modal}>
  `;
}

// ----- TIMER -----
// 走行中タイマーの状態を、タブ切替で Timer がアンマウントされても保持するための
// モジュールレベルの保管庫。これが無いと別タブに移った瞬間に進行中のセッションが消える。
// （ページ完全リロードまでは保持しない。それは将来 state 永続化で対応。）
let timerKeep = null;

function Timer() {
  const { state, dispatch, addToast, confirm } = useApp();
  const [dur, setDur] = useState(state.timer.lastDurationMin || 25);
  const [timeLeft, setTimeLeft] = useState(dur * 60);
  const [running, setRunning] = useState(false);
  const [zen, setZen] = useState(false);
  const [bgm, setBgm] = useState(null);
  const reqRef = useRef(0);
  const endRef = useRef(0);
  const fillRef = useRef(null);
  const timeTxtRef = useRef(null);
  const lastSecRef = useRef(-1);
  const liveRef = useRef(null);
  // 毎レンダーで最新値を保持し、アンマウント時の cleanup から参照する。
  liveRef.current = { dur, running, timeLeft, endTime: endRef.current };

  // マウント時に保管庫から復元し、アンマウント時に最新状態を保管する。
  useEffect(() => {
    const k = timerKeep;
    if (k) {
      setDur(k.dur);
      if (k.running && k.endTime) {
        const left = (k.endTime - Date.now()) / 1000;
        if (left > 0) { setTimeLeft(left); setRunning(true); }
        else { setTimeLeft(k.dur * 60); }
      } else {
        setTimeLeft(k.timeLeft && k.timeLeft > 0 ? k.timeLeft : k.dur * 60);
      }
    }
    return () => {
      const l = liveRef.current;
      timerKeep = { dur: l.dur, running: l.running, timeLeft: l.timeLeft, endTime: l.endTime };
    };
  }, []);

  const aTarget = state.activeTimerTarget;

  const handleTargetChange = (e) => {
    const val = e.currentTarget.value;
    if (val === 'free') {
      dispatch({ type: 'SET_ACTIVE_TIMER_TARGET', target: null });
    } else if (val.startsWith('task_')) {
      const taskId = val.replace('task_', '');
      const t = state.tasks.find(x => x.id === taskId);
      if (t) dispatch({ type: 'SET_ACTIVE_TIMER_TARGET', target: { type: 'task', id: t.id, title: t.title } });
    }
  };

  let isTargetDone = false;
  let targetTitle = '';
  if (aTarget) {
     targetTitle = aTarget.title;
     if (aTarget.type === 'task') {
       const t = state.tasks.find(x => x.id === aTarget.id);
       if (t) isTargetDone = t.done;
     } else if (aTarget.type === 'node') {
       const m = state.maps.find(x => x.id === aTarget.mapId);
       if (m && m.nodes[aTarget.id]) isTargetDone = m.nodes[aTarget.id].manualDone;
     }
  }

  useEffect(() => { AudioEngine.setVolume(state.settings.soundVolume); }, [state.settings.soundVolume]);

  useEffect(() => {
    if (AudioEngine.isPlaying()) {
       const el = document.getElementById('bgm-player');
       if (el && el.dataset.currentId) setBgm(el.dataset.currentId);
    }
  }, []);

  const finish = useCallback(() => {
    setRunning(false); setTimeLeft(0); endRef.current = 0; timerKeep = null; AudioEngine.chime();
    dispatch({ type: 'LOG_SESSION', durationMin: dur });
    addToast('セッション完了', 'success');
    if (aTarget && !isTargetDone) {
      confirm(`「${targetTitle}」を完了にしますか？`).then(yes => {
        if (!yes) return;
        if (aTarget.type === 'task') dispatch({ type: 'TOGGLE_TASK', id: aTarget.id });
        if (aTarget.type === 'node') dispatch({ type: 'TOGGLE_MAP_NODE', mapId: aTarget.mapId, nodeId: aTarget.id });
      });
    }
  }, [dur, aTarget, isTargetDone, targetTitle, dispatch, addToast, confirm]);

  useEffect(() => {
    if (!running) {
      cancelAnimationFrame(reqRef.current);
      return;
    }
    
    const targetTime = Date.now() + timeLeft * 1000;
    endRef.current = targetTime; // アンマウント時に残り時間を再計算できるよう終了時刻を保持
    const totalSecs = dur * 60;

    const tick = () => {
      const now = Date.now();
      const left = (targetTime - now) / 1000;
      
      if (left <= 0) { 
        finish(); 
      } else { 
        const prog = clamp((totalSecs - left) / totalSecs, 0, 1);
        if (fillRef.current) {
          const displayProg = 0.05 + (prog * 0.95);
          const baseY = (1 - displayProg) * 100;
          // 後半(35%経過後)からだんだん水面が揺れて軽く波立つ
          const intensity = clamp((prog - 0.35) / 0.65, 0, 1);
          const bob = (Math.sin(now / 360) * 1.6 + Math.sin(now / 170) * 0.5) * intensity;
          fillRef.current.style.transform = `translateY(${baseY + bob}%)`;
        }
        if (timeTxtRef.current) {
          timeTxtRef.current.innerText = fmtClock(left);
        }
        // 水位を極限まで滑らかに：水位と残り時間はDOMを直接更新しているので、
        // 重いReact再描画は表示秒が変わった時(=1秒に1回)だけに絞る。
        // これで毎フレームの再描画によるフレーム落ち(カクつき)が無くなり、RAFだけで滑らかに動く。
        const wholeLeft = Math.ceil(left);
        if (wholeLeft !== lastSecRef.current) {
          lastSecRef.current = wholeLeft;
          setTimeLeft(left);
        }
        reqRef.current = requestAnimationFrame(tick); 
      }
    };
    reqRef.current = requestAnimationFrame(tick);
    
    return () => {
      cancelAnimationFrame(reqRef.current);
      setTimeLeft(Math.max(0, (targetTime - Date.now()) / 1000));
    };
  }, [running, dur, finish]);

  const toggleZen = () => {
    if (!zen) {
      setZen(true);
      try { document.documentElement.requestFullscreen(); } catch(e){}
    } else {
      setZen(false);
      try { document.exitFullscreen(); } catch(e){}
    }
  };

  const progress = dur * 60 > 0 ? clamp(1 - (timeLeft / (dur * 60)), 0, 1) : 0;
  const initialProg = 0.05 + (progress * 0.95);

  // 停止中(一時停止/初期/スライダー操作)は描画前に水位をセットしてチラつきを防ぐ。
  // 実行中はRAFが毎フレーム水位を制御するので、ここは何もしない＝Reactが上書きせず完全に滑らか。
  useLayoutEffect(() => {
    if (!running && fillRef.current) {
      fillRef.current.style.transform = `translateY(${(1 - initialProg) * 100}%)`;
    }
  }, [running, initialProg]);

  if (zen) {
    return html`
      <div class="zen">
        <div class="water-fill" ref=${fillRef}>
          <svg class="wave wave--a" viewBox="0 0 120 24" preserveAspectRatio="none"><path d="M0 12 C 20 2 40 2 60 12 S 100 22 120 12 V24 H0 Z"/></svg>
          <svg class="wave wave--b" viewBox="0 0 120 24" preserveAspectRatio="none"><path d="M0 12 C 20 2 40 2 60 12 S 100 22 120 12 V24 H0 Z"/></svg>
          <span class="bubble" style="left:22%; width:7px; height:7px; animation-duration:5.5s; animation-delay:0s;"></span>
          <span class="bubble" style="left:42%; width:4px; height:4px; animation-duration:4.2s; animation-delay:1.4s;"></span>
          <span class="bubble" style="left:60%; width:9px; height:9px; animation-duration:6.8s; animation-delay:0.7s;"></span>
          <span class="bubble" style="left:74%; width:5px; height:5px; animation-duration:5s; animation-delay:2.3s;"></span>
          <span class="bubble" style="left:33%; width:5px; height:5px; animation-duration:6s; animation-delay:3.1s;"></span>
        </div>
        <button class="glass-btn glass-btn--icon zen__close" aria-label="全画面を終了" onClick=${toggleZen}><${Icon} n="compress"/></button>
        <div class="zen__center">
          ${aTarget ? html`<div style="color:var(--holo-cyan); font-size:1.2rem; font-weight:600; text-shadow:0 0 10px rgba(0,0,0,0.5); margin-bottom: 20px;">${targetTitle}</div>` : null}
          <div class="timer-display-box">
            <div class="timer-time" ref=${timeTxtRef}>${fmtClock(timeLeft)}</div>
          </div>
          <div class="flex-row mt-4">
            <button class="holo-btn-start" aria-label=${running ? '一時停止' : '開始'} onClick=${() => setRunning(!running)}>
              <${Icon} n=${running ? 'pause' : 'play'} size=32/>
            </button>
          </div>
        </div>
      </div>
    `;
  }

  return html`
    <div class="app__inner">
      <div class="glass-panel glass-panel--sm mb-4" style="padding: 12px; border-color: var(--holo-cyan); box-shadow: var(--glow-cyan);">
        <div class="flex-between">
          <div class="holo-label" style="margin:0; color: var(--text-cyan);">TARGET</div>
          <select class="glass-select" style="width: 70%; padding: 6px 12px; font-size: 0.9rem; background: rgba(0,0,0,0.4);" value=${aTarget && aTarget.type === 'task' ? `task_${aTarget.id}` : 'free'} onChange=${handleTargetChange} disabled=${running}>
            <option value="free">Free Focus</option>
            ${state.tasks.filter(t => !t.done).map(t => html`<option key=${t.id} value="task_${t.id}">${t.title}</option>`)}
          </select>
        </div>
      </div>

      <div class="water-wrap mt-4 mb-4">
        <div class="water-fill" ref=${fillRef}>
          <svg class="wave wave--a" viewBox="0 0 120 24" preserveAspectRatio="none"><path d="M0 12 C 20 2 40 2 60 12 S 100 22 120 12 V24 H0 Z"/></svg>
          <svg class="wave wave--b" viewBox="0 0 120 24" preserveAspectRatio="none"><path d="M0 12 C 20 2 40 2 60 12 S 100 22 120 12 V24 H0 Z"/></svg>
          <span class="bubble" style="left:22%; width:7px; height:7px; animation-duration:5.5s; animation-delay:0s;"></span>
          <span class="bubble" style="left:42%; width:4px; height:4px; animation-duration:4.2s; animation-delay:1.4s;"></span>
          <span class="bubble" style="left:60%; width:9px; height:9px; animation-duration:6.8s; animation-delay:0.7s;"></span>
          <span class="bubble" style="left:74%; width:5px; height:5px; animation-duration:5s; animation-delay:2.3s;"></span>
          <span class="bubble" style="left:33%; width:5px; height:5px; animation-duration:6s; animation-delay:3.1s;"></span>
        </div>
        <div class="timer-face">
          <div class="timer-display-box">
            <div class="timer-time" ref=${timeTxtRef}>${fmtClock(timeLeft)}</div>
          </div>
        </div>
      </div>

      <div class="flex-row" style="justify-content: center; gap: 24px; margin-bottom: 30px;">
        <button class="glass-btn glass-btn--icon" aria-label="リセット" onClick=${() => { setRunning(false); setTimeLeft(dur * 60); }}><${Icon} n="x"/></button>
        <button class="holo-btn-start" aria-label=${running ? '一時停止' : '開始'} onClick=${() => setRunning(!running)}>
          <${Icon} n=${running ? 'pause' : 'play'} size=32/>
        </button>
        <button class="glass-btn glass-btn--icon" aria-label="全画面（集中モード）" onClick=${toggleZen}><${Icon} n="expand"/></button>
      </div>
      
      <div class="glass-panel mb-4">
        <div class="module-header"><div class="holo-icon-group"><div class="holo-icon"><${Icon} n="clock"/></div><div class="holo-label">時間設定</div></div></div>
        <input type="range" min="1" max="120" step="1" value=${dur} disabled=${running} style="width:100%; accent-color: var(--holo-cyan); margin-bottom: 12px;" 
          onInput=${e => { const val = parseInt(e.target.value, 10); setDur(val); if(!running) setTimeLeft(val * 60); }} />
        <div class="flex-between">
          <span class="holo-label">自由入力(分)</span>
          <input class="glass-input" type="number" min="1" max="600" value=${dur} disabled=${running} style="width:100px; text-align:center; padding: 8px;"
            onInput=${e => { const val = clamp(parseInt(e.target.value || '1', 10), 1, 600); setDur(val); if(!running) setTimeLeft(val * 60); }} />
        </div>
      </div>

      <div class="glass-panel">
        <div class="module-header"><div class="holo-icon-group"><div class="holo-icon"><${Icon} n="music"/></div><div class="holo-label">環境音設定</div></div></div>
        <div class="audio-grid">
          ${BGM_FILES.map(f => html`
            <div class="audio-card ${bgm === f.id ? 'is-active' : ''}" key=${f.id} onClick=${() => { const isP = AudioEngine.toggle(f.id); setBgm(isP ? f.id : null); }}>
              <${Icon} n=${f.ico} size=24/>
              <span class="holo-label">${f.nm}</span>
            </div>
          `)}
        </div>
      </div>
    </div>
  `;
}

// ----- CARDS (Flashcards Memory Engine) -----
function Cards() {
  const { state, dispatch, addToast } = useApp();
  
  const [front, setFront] = useState(''); 
  const [back, setBack] = useState('');
  const [category, setCategory] = useState('');
  const [tags, setTags] = useState('');
  
  const [queue, setQueue] = useState([]); 
  const [idx, setIdx] = useState(0); 
  const [flip, setFlip] = useState(false);
  
  const [searchQuery, setSearchQuery] = useState('');
  const [filterCategory, setFilterCategory] = useState('All');
  
  const [editCard, setEditCard] = useState(null);

  const dueCards = state.cards.filter(c => c.due <= today());

  const categories = useMemo(() => {
    return Array.from(new Set(state.cards.map(c => c.category || '一般')));
  }, [state.cards]);

  const filteredCards = useMemo(() => {
    return state.cards.filter(c => {
      const matchCat = filterCategory === 'All' || (c.category || '一般') === filterCategory;
      const q = searchQuery.toLowerCase();
      const matchSearch = q === '' || c.front.toLowerCase().includes(q) || c.back.toLowerCase().includes(q) || (c.tags || []).join(' ').toLowerCase().includes(q);
      return matchCat && matchSearch;
    });
  }, [state.cards, filterCategory, searchQuery]);

  const start = () => {
    if(!dueCards.length) return addToast('学習するフラッシュカードがありません', 'info');
    setQueue(dueCards.map(c => c.id).sort(() => Math.random() - 0.5));
    setIdx(0); setFlip(false);
  };

  const grade = (g) => {
    dispatch({ type: 'REVIEW_CARD', id: queue[idx], grade: g });
    setFlip(false);

    let nextQueue = [...queue];
    let nextIdx = idx + 1;

    // 「もう一度」または「難しい」の場合は、学習キューの最後に再度追加して覚えるまで繰り返す
    if (g < 4) {
      nextQueue.push(queue[idx]);
    }

    if (nextIdx < nextQueue.length) {
      setQueue(nextQueue);
      setIdx(nextIdx);
    } else {
      setQueue([]); 
      addToast('学習セッション完了！', 'success');
    }
  };

  const add = () => {
    if(!front.trim() || !back.trim()) return;
    dispatch({ 
      type: 'ADD_CARD', 
      card: { 
        id: uid(), front: front.trim(), back: back.trim(), 
        category: category.trim() || '一般', 
        tags: tags.split(',').map(t=>t.trim()).filter(Boolean),
        ease: 2.5, interval: 0, reps: 0, due: today() 
      } 
    });
    setFront(''); setBack(''); setTags('');
    addToast('フラッシュカードを保存しました', 'success');
  };

  const saveEdit = () => {
    if(!editCard.front.trim() || !editCard.back.trim()) return;
    dispatch({ type: 'UPDATE_CARD', card: editCard });
    setEditCard(null);
    addToast('フラッシュカードを更新しました', 'success');
  };

  if (queue.length > 0) {
    const card = state.cards.find(c => c.id === queue[idx]);
    return html`
      <div class="app__inner">
        <div class="flex-between">
          <div class="holo-label">残り: ${queue.length - idx} / ${queue.length}</div>
          <button class="glass-btn glass-btn--sm" onClick=${() => setQueue([])}>中断</button>
        </div>
        <div class="flash-stage">
          <div class="flash-card ${flip ? 'is-flip' : ''}" onClick=${() => !flip && setFlip(true)}>
            <div class="flash-face"><div class="flash-q">${card.front}</div></div>
            <div class="flash-face is-back"><div class="flash-a">${card.back}</div></div>
          </div>
          ${!flip ? html`
            <button class="glass-btn glass-btn--primary glass-btn--block mt-4" onClick=${() => setFlip(true)}>
              解答を見る
            </button>
          ` : html`
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; margin-top: 16px;">
              <button class="glass-btn glass-btn--danger" style="padding: 10px 4px; font-size: 0.85rem;" onClick=${(e) => { e.stopPropagation(); grade(2); }}>もう一度</button>
              <button class="glass-btn" style="padding: 10px 4px; font-size: 0.85rem;" onClick=${(e) => { e.stopPropagation(); grade(3); }}>難しい</button>
              <button class="glass-btn glass-btn--primary" style="padding: 10px 4px; font-size: 0.85rem;" onClick=${(e) => { e.stopPropagation(); grade(4); }}>普通 (覚えた)</button>
              <button class="glass-btn" style="padding: 10px 4px; font-size: 0.85rem; border-color: var(--success); color: var(--success);" onClick=${(e) => { e.stopPropagation(); grade(5); }}>簡単</button>
            </div>
          `}
        </div>
      </div>
    `;
  }

  return html`
    <div class="app__inner">
      <div class="glass-panel flex-between">
        <div>
          <div class="holo-data" style="font-size:2rem; color: var(--text-cyan); text-shadow: var(--text-glow-cyan);">${dueCards.length}</div>
          <div class="holo-label">今日の学習カード</div>
        </div>
        <button class="glass-btn glass-btn--primary glass-btn--icon" aria-label="今日のカード学習を開始" onClick=${start}><${Icon} n="play"/></button>
      </div>

      <div class="glass-panel">
        <div class="module-header"><div class="holo-icon-group"><div class="holo-icon"><${Icon} n="plus"/></div><div class="holo-label">フラッシュカード作成</div></div></div>
        
        <div class="holo-label mb-2">カテゴリ</div>
        <input class="glass-input mb-4" placeholder="例: 英語、プログラミング..." value=${category} onInput=${e => setCategory(e.currentTarget.value)}/>
        
        <div class="holo-label mb-2">タグ（カンマ区切り）</div>
        <input class="glass-input mb-4" placeholder="例: 重要, TOEIC" value=${tags} onInput=${e => setTags(e.currentTarget.value)}/>

        <div class="holo-label mb-2">問題 (Question)</div>
        <input class="glass-input mb-4" placeholder="問題を入力..." value=${front} onInput=${e => setFront(e.currentTarget.value)}/>
        
        <div class="holo-label mb-2">解答 (Answer)</div>
        <textarea class="glass-textarea mb-4" placeholder="解答を入力..." value=${back} onInput=${e => setBack(e.currentTarget.value)}></textarea>
        
        <button class="glass-btn glass-btn--primary glass-btn--block" onClick=${add}>保存して追加</button>
      </div>

      <div class="glass-panel mt-4">
        <div class="module-header">
          <div class="holo-icon-group">
            <div class="holo-icon"><${Icon} n="search"/></div>
            <div class="holo-label">カード検索・管理 (${filteredCards.length})</div>
          </div>
        </div>

        <div class="grid-2 mb-4">
          <input class="glass-input" placeholder="検索..." value=${searchQuery} onInput=${e => setSearchQuery(e.currentTarget.value)} />
          <select class="glass-select" value=${filterCategory} onChange=${e => setFilterCategory(e.currentTarget.value)}>
            <option value="All">すべてのカテゴリ</option>
            ${categories.map(c => html`<option value=${c}>${c}</option>`)}
          </select>
        </div>

        <div class="holo-list" style="max-height: 400px; overflow-y: auto;">
          ${filteredCards.length ? filteredCards.map(c => html`
            <div class="holo-item" key=${c.id} style="align-items: flex-start;">
              <div class="holo-item__text">
                <div style="font-size: 0.75rem; color: var(--holo-cyan); margin-bottom: 6px; font-weight: 700;">
                  ${c.category || '一般'} ${c.tags && c.tags.length ? `· ${c.tags.join(', ')}` : ''}
                </div>
                <div style="font-weight:600; margin-bottom: 6px;">Q: ${c.front}</div>
                <div style="font-size: 0.85rem; color: var(--text-muted);">A: ${c.back} <br/><span style="font-size: 0.7rem; opacity: 0.8;">(次回学習: ${c.due})</span></div>
              </div>
              <div style="display:flex; flex-direction:column; gap:8px;">
                <button class="glass-btn glass-btn--icon" style="width:32px; height:32px; min-width:32px; border:none; flex-shrink:0;" aria-label="カードを編集" onClick=${() => setEditCard(c)}><${Icon} n="edit" size=14/></button>

// ----- GOALS (Strategic Planning) -----
function Goals({ go }) {
  const { state, dispatch, confirm } = useApp();
  const [modalOpen, setModalOpen] = useState(false);
  const [autoPlan, setAutoPlan] = useState(null); // null | { title, deadline, goalId }
  const [f, setF] = useState({ id: '', title: '', deadline: '', metricOn: false, metricTarget: '', metricUnit: '', metricDone: 0 });

  const save = () => {
    if (!f.title.trim()) return;
    const goal = { id: f.id || uid(), title: f.title.trim(), deadline: f.deadline };
    const target = parseInt(f.metricTarget, 10);
    if (f.metricOn && target > 0) {
      const done = clamp(parseInt(f.metricDone, 10) || 0, 0, target);
      goal.metric = { done, target, unit: (f.metricUnit || '').trim() };
    }
    dispatch({ type: f.id ? 'UPDATE_GOAL' : 'ADD_GOAL', goal });
    setModalOpen(false);
  };

  const openNew = () => { setF({ id: '', title: '', deadline: addDays(today(), 30), metricOn: false, metricTarget: '', metricUnit: '', metricDone: 0 }); setModalOpen(true); };
  const openEdit = (g) => { setF({ id: g.id, title: g.title, deadline: g.deadline || '', metricOn: !!g.metric, metricTarget: g.metric ? String(g.metric.target) : '', metricUnit: (g.metric && g.metric.unit) || '', metricDone: g.metric ? g.metric.done : 0 }); setModalOpen(true); };
  const del = async (g) => { if (await confirm(`目標「${g.title}」を削除しますか？`)) dispatch({ type: 'DELETE_GOAL', id: g.id }); };
  const adjust = (g, delta) => { if (!g.metric) return; const done = clamp(g.metric.done + delta, 0, g.metric.target); dispatch({ type: 'UPDATE_GOAL', goal: { ...g, metric: { ...g.metric, done } } }); };

  return html`
    <div class="app__inner">
      <button class="glass-btn glass-btn--primary glass-btn--block" onClick=${() => setAutoPlan({})}>
        <${Icon} n="calendar"/> 目標からカレンダーに自動で割り振る
      </button>
      <button class="glass-btn glass-btn--block mb-4" onClick=${openNew}>
        <${Icon} n="plus"/> 目標だけを追加（手動）
      </button>

      ${state.goals.length === 0 ? html`<div class="glass-panel text-center"><div class="holo-label" style="text-transform:none; letter-spacing:normal; line-height:1.7;">まだ目標がありません。<br/>上のボタンか、AIコーチの「目標を分解」から始めましょう。</div></div>` : null}

      <div class="holo-list">
        ${state.goals.map(g => {
          const ratio = g.metric && g.metric.target ? clamp(g.metric.done / g.metric.target, 0, 1) : 0;
          return html`
          <div class="glass-panel" style="padding:20px;" key=${g.id}>
            <div class="flex-between mb-4">
              <div class="holo-data" style="font-size: 1.1rem; line-height: 1.3; color: var(--text-cyan); text-shadow: var(--text-glow-cyan);">${g.title}</div>
              <div class="flex-row">
                <button class="glass-btn glass-btn--icon" style="width:36px; height:36px; min-width:36px;" aria-label="目標を編集" onClick=${() => openEdit(g)}><${Icon} n="edit" size=16/></button>
                <button class="glass-btn glass-btn--icon" style="width:36px; height:36px; min-width:36px;" aria-label="目標を削除" onClick=${() => del(g)}><${Icon} n="trash" size=16/></button>
              </div>
            </div>
            <div class="holo-label">期限: ${g.deadline || '未設定'}</div>
            ${g.metric ? html`
              <div class="flex-row mt-4" style="gap:12px;">
                <div class="line-bar-wrap" style="flex:1;" role="progressbar" aria-valuemin="0" aria-valuemax=${g.metric.target} aria-valuenow=${g.metric.done} aria-label="進捗">
                  <div class="line-bar-fill" style="width: ${ratio * 100}%"></div>
                </div>
                <div class="holo-label" style="white-space:nowrap; margin:0;">${g.metric.done} / ${g.metric.target} ${g.metric.unit || ''}</div>
              </div>
              <div class="flex-row mt-2" style="justify-content:flex-end; gap:8px;">
                <button class="glass-btn glass-btn--icon" style="width:34px;height:34px;min-width:34px;" aria-label="進捗を1減らす" onClick=${() => adjust(g, -1)}><span style="font-size:1.2rem; line-height:1;">−</span></button>
                <button class="glass-btn glass-btn--icon" style="width:34px;height:34px;min-width:34px;" aria-label="進捗を1増やす" onClick=${() => adjust(g, 1)}><${Icon} n="plus" size=16/></button>
              </div>
            ` : null}
            <button class="glass-btn glass-btn--block mt-4" onClick=${() => setAutoPlan({ title: g.title, deadline: g.deadline, goalId: g.id })}>
              <${Icon} n="calendar" size=16/> カレンダーに割り振る
            </button>
          </div>
        `;})}
      </div>

      ${autoPlan ? html`<${AutoPlanModal} initial=${autoPlan} onClose=${() => setAutoPlan(null)} go=${go}/>` : null}

      ${modalOpen ? html`
        <${Modal} title="目標設定" icon="target" onClose=${() => setModalOpen(false)}>
          <div class="holo-label mb-2">目標名</div>
          <input class="glass-input mb-4" value=${f.title} onInput=${e => setF({...f, title: e.currentTarget.value})} aria-label="目標名"/>
          <div class="holo-label mb-2">期限</div>
          <input class="glass-input mb-4" type="date" value=${f.deadline} onInput=${e => setF({...f, deadline: e.currentTarget.value})} aria-label="期限"/>

          <button type="button" class="check-btn flex-row" role="checkbox" aria-checked=${f.metricOn} style="gap:12px; margin-bottom:16px; width:100%; text-align:left;" onClick=${() => setF({...f, metricOn: !f.metricOn})}>
            <span class="holo-checkbox ${f.metricOn ? 'is-on' : ''}"><${Icon} n="check" size=16/></span>
            <span class="holo-item__text" style="font-size:0.9rem;">数値で進捗を管理する</span>
          </button>

          ${f.metricOn ? html`
            <div class="grid-2 mb-4">
              <div>
                <div class="holo-label mb-2">目標値</div>
                <input class="glass-input" type="number" min="1" placeholder="例: 30" value=${f.metricTarget} onInput=${e => setF({...f, metricTarget: e.currentTarget.value})} aria-label="目標値"/>
              </div>
              <div>
                <div class="holo-label mb-2">単位（任意）</div>
                <input class="glass-input" placeholder="例: 冊 / 回 / km" value=${f.metricUnit} onInput=${e => setF({...f, metricUnit: e.currentTarget.value})} aria-label="単位"/>
              </div>
            </div>
            <div class="holo-label mb-2">現在の進捗</div>
            <input class="glass-input mb-4" type="number" min="0" value=${f.metricDone} onInput=${e => setF({...f, metricDone: e.currentTarget.value})} aria-label="現在の進捗"/>
          ` : null}

          <button class="glass-btn glass-btn--primary glass-btn--block mt-4" onClick=${save}>保存</button>
        </${Modal}>
      ` : null}
    </div>
  `;
}

// ----- INSIGHT (Analytics) -----
function Insight() {
  const { state } = useApp();
  const dnames = ['日', '月', '火', '水', '木', '金', '土'];
  const wThis = state.timer.sessions.reduce((a, s) => a + s.min, 0);

  // 直近7日の実データ（曜日ラベル・分数）。ダミー乱数を廃止して実績を反映。
  const last7 = useMemo(() => {
    const days = [];
    for (let i = 6; i >= 0; i--) {
      const ds = addDays(today(), -i);
      const min = state.timer.sessions
        .filter(s => dstr(new Date(s.t)) === ds)
        .reduce((a, s) => a + s.min, 0);
      const dow = dnames[new Date(ds + 'T00:00:00').getDay()];
      days.push({ ds, min, dow, isToday: ds === today() });
    }
    return days;
  }, [state.timer.sessions]);
  const maxMin = Math.max(1, ...last7.map(d => d.min));
  const week7 = last7.reduce((a, d) => a + d.min, 0);

  return html`
    <div class="app__inner">
      <div class="glass-panel">
        <div class="module-header"><div class="holo-icon-group"><div class="holo-icon"><${Icon} n="insight"/></div><div class="holo-label">システム解析</div></div></div>
        <div class="holo-data text-center" style="font-size:2rem; color:var(--text-cyan); text-shadow:var(--text-glow-cyan);">${wThis} 分</div>
        <div class="holo-label text-center mb-4">累計集中時間 ・ 直近7日 ${week7} 分</div>

        <div class="flex-row" style="align-items:flex-end; height: 80px; gap: 8px;">
           ${last7.map(d => html`
             <div key=${d.ds} style="flex:1; display:flex; flex-direction:column; align-items:center; gap:8px;" title="${d.ds}: ${d.min}分">
               <div style="width:100%; border-radius: 4px; height: ${d.min ? Math.max(8, (d.min / maxMin) * 100) : 4}%;
                 background: linear-gradient(180deg, var(--holo-cyan), rgba(77,154,236,0.2));
                 ${d.isToday ? 'box-shadow: 0 0 8px var(--holo-cyan); outline: 1px solid var(--holo-cyan);' : ''}
                 ${d.min ? '' : 'opacity: 0.35;'}"></div>
               <div class="holo-label" style="${d.isToday ? 'color: var(--holo-cyan);' : ''}">${d.dow}</div>
             </div>
           `)}
        </div>
      </div>
      
      <div class="grid-2">
        <div class="glass-panel text-center">
          <div class="holo-data" style="color: var(--text-cyan); text-shadow: var(--text-glow-cyan);">${state.xp}</div><div class="holo-label mt-4">累計XP</div>
        </div>
        <div class="glass-panel text-center">
          <div class="holo-data" style="color: var(--text-cyan); text-shadow: var(--text-glow-cyan);">${state.streak}</div><div class="holo-label mt-4">連続達成日数</div>
        </div>
      </div>
    </div>
  `;
}
